async function initFB(){if(_fbReady)return;const{initializeApp}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");const{getDatabase,ref,set,get,onValue,update}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");const app=initializeApp(FB_CFG);const db=getDatabase(app);window._fb={ref,set,get,onValue,update,db};_fbReady=true;}

// DATE/TIME — ใช้ thaiNow() แทน new Date() เพื่อให้เวลา ณ ตอนนั้น
// ════════════════════════════════════════════════════════════════
function thaiNow(){return new Date();}
function fmtTime(d){return d.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});}
function fmtDate(d){return d.toLocaleDateString("th-TH",{weekday:"long",year:"numeric",month:"long",day:"numeric"});}
function fmtISO(d){
  // วันที่ในเขตเวลาไทย (UTC+7) — แก้ปัญหา ISO.slice เป็น UTC
  const offset=7*60;const loc=new Date(d.getTime()+offset*60000);
  return loc.toISOString().slice(0,10);
}

function updateAllArr(id,patch){
  const upd=arr=>arr.map(t=>t.id===id?{...t,...patch}:t);
  TASKS=upd(TASKS);DAILY_TASKS=upd(DAILY_TASKS);BARISTA_TASKS=upd(BARISTA_TASKS);

  WEEKLY_TODAY=upd(WEEKLY_TODAY);WEEKLY_ALL=upd(WEEKLY_ALL);
}

function isTimePast(hhmm){
  if(!hhmm||hhmm==="ก่อนเลิกงาน")return false;
  const[h,m]=hhmm.split(":").map(Number);
  const n=thaiNow();return n.getHours()*60+n.getMinutes()>h*60+m;
}
function getEffStatus(t){
  if(t.status!=="ยังไม่ทำ")return t.status;
  return isTimePast(t.deadline)?"เลยเวลา":"ยังไม่ทำ";
}

    if(att){Object.entries(att).forEach(([name,d])=>{const s=STAFF.find(x=>x.name===name);if(s){s.checkIn=d.checkIn||null;s.checkOut=d.checkOut||null;s.status=d.status||"ยังไม่เข้างาน";s.checkInPhoto=d.photoUrl||null;s.checkOutPhoto=d.checkOutPhotoUrl||null;}});}
    const tasks=await fbGet(`tasks/${todayISO}`);
    if(tasks){Object.entries(tasks).forEach(([id,d])=>updateAllArr(id,d));}
    const wk=await fbGet(`weeklyTasks/${weekISO}`);
    if(wk){Object.entries(wk).forEach(([id,d])=>updateAllArr(id,d));}
    const cats=await fbGet(`catHealth/${todayISO}`);
    if(cats){Object.entries(cats).forEach(([name,d])=>{ST.catLogs[name]=d;});}
    const leaves=await fbGet(`leaveRequests`);
    if(leaves){ST.leaveRequests=Object.entries(leaves).map(([id,d])=>({id,...d}));}
    const hol=await fbGet(`settings/holidayMode`);if(hol!==null)ST.holidayMode=hol;
    const sets=await fbGet(`settings/appSettings`);if(sets)Object.assign(ST.settings,sets);
    ST.fbConnected=true;
  }catch(e){ST.fbConnected=false;}
  render();startListening();startClock();
}

function startListening(){
  fbListen(`attendance/${todayISO}`,(att)=>{
    if(!att)return;
    Object.entries(att).forEach(([name,d])=>{const s=STAFF.find(x=>x.name===name);if(s){s.checkIn=d.checkIn||null;s.checkOut=d.checkOut||null;s.status=d.status||"ยังไม่เข้างาน";s.checkInPhoto=d.photoUrl||null;s.checkOutPhoto=d.checkOutPhotoUrl||null;}});
    ST.fbConnected=true;render();
  });
  fbListen(`tasks/${todayISO}`,(tasks)=>{if(!tasks)return;Object.entries(tasks).forEach(([id,d])=>updateAllArr(id,d));render();});
  fbListen(`weeklyTasks/${weekISO}`,(wk)=>{if(!wk)return;Object.entries(wk).forEach(([id,d])=>updateAllArr(id,d));render();});
  fbListen(`catHealth/${todayISO}`,(cats)=>{if(!cats)return;Object.entries(cats).forEach(([name,d])=>{ST.catLogs[name]=d;});render();});
  fbListen(`leaveRequests`,(leaves)=>{if(!leaves)return;ST.leaveRequests=Object.entries(leaves).map(([id,d])=>({id,...d}));render();});
  fbListen(`settings/holidayMode`,(v)=>{if(v!==null&&ST.holidayMode!==v){ST.holidayMode=v;render();}});
}

async function reqNotifPerm(){
  if(!("Notification" in window)){alert("เบราว์เซอร์นี้ไม่รองรับ Push Notification");return;}
  const p=await Notification.requestPermission();
  if(p==="granted"){pushNotif("🐱 Mori Staff Check","เปิดใช้การแจ้งเตือนแล้วค่ะ!");}
  render();
}
function pushNotif(title,body,urgent=false){
  if(!ST.settings.notifTask&&!urgent)return;
  if(Notification.permission==="granted"){
    new Notification(title,{body,icon:"https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/72x72/1f431.png",badge:"https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/72x72/1f431.png",vibrate:urgent?[200,100,200]:undefined});
  }
}

function b64toFile(d,n){const a=d.split(","),m=a[0].match(/:(.*?);/)[1],s=atob(a[1]);let l=s.length;const u=new Uint8Array(l);while(l--){u[l]=s.charCodeAt(l);}return new File([u],n,{type:m});}
function bc(st){
  if(["ผ่าน","เข้างานแล้ว","อนุมัติ"].includes(st))return"background:#EAF3DE;color:#639922";
  if(["รอตรวจ","ส่งแล้ว","รออนุมัติ"].includes(st))return"background:#FAEEDA;color:#BA7517";
  if(["ตีกลับ","เลยเวลา","ลืมงาน","ไม่อนุมัติ"].includes(st))return"background:#FCEBEB;color:#A32D2D";
  if(st==="มาสาย")return"background:#FAECE7;color:#D85A30";

}

            :`<button class="pb" onclick="document.getElementById('kFile').click()">📷 ถ่ายรูปก่อนบันทึก (บังคับ)</button>`}
        </div>

      </div>
      <button class="btn" style="background:#F1EFE8;color:#888780" onclick="ST.kittenModal=null;render()">ปิด</button>

  return hdr+notifPanel+content+modal+nav;
}

function selU(id){ST.loginUser=USERS.find(u=>u.id===id);ST.pinInput="";ST.loginError="";render();}
function backSel(){ST.loginUser=null;render();}
function logout(){ST.loggedIn=false;ST.loginUser=null;ST.pinInput="";render();}
function pinP(d){
  if(d==="⌫"){ST.pinInput=ST.pinInput.slice(0,-1);render();return;}
  if(d==="")return;
  ST.pinInput+=d;render();
  if(ST.pinInput.length===4){if(ST.pinInput===ST.loginUser.pin){ST.loggedIn=true;ST.loginError="";}else{ST.loginError="PIN ไม่ถูกต้อง";ST.pinInput="";}render();}
}
async function toggleHol(){if(!confirm(ST.holidayMode?"ยืนยันเปิดร้านปกติ?":"ยืนยันตั้งเป็นวันหยุดร้าน?"))return;ST.holidayMode=!ST.holidayMode;await fbSet(`settings/holidayMode`,ST.holidayMode);addN(ST.holidayMode?"🏖️ วันหยุดร้าน":"✅ เปิดร้านปกติแล้ว",ST.holidayMode);render();}

function handleCI(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{ST.checkInPhoto=e.target.result;render();};r.readAsDataURL(f);}
function handleCO(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{ST.checkOutPhoto=e.target.result;render();};r.readAsDataURL(f);}
function handleTP(inp){
  const files=Array.from(inp.files);if(!files.length)return;
  if(!ST.taskPhotos[ST.taskModal])ST.taskPhotos[ST.taskModal]=[];
  ST.taskAnalyzing=true;render();let done=0;
  files.forEach(file=>{const r=new FileReader();r.onload=e=>{
    ST.taskPhotos[ST.taskModal].push({preview:e.target.result,url:null,file});done++;
    if(done===files.length){Promise.all(ST.taskPhotos[ST.taskModal].filter(p=>!p.url).map(p=>upload(p.file).then(u=>{p.url=u||p.preview;}))).then(()=>{ST.taskAI=mockAI();ST.taskAnalyzing=false;render();});}
  };r.readAsDataURL(file);});
}

async function doCI(){
  if(!ST.checkInPhoto)return;const me=ST.loginUser;
  const now2=thaiNow();const h=now2.getHours(),m=now2.getMinutes();
  const late=h*60+m>11*60+30;const st=late?"มาสาย":"เข้างานแล้ว";
  const t=fmtTime(now2);
  const s=STAFF.find(x=>x.id===me.id);if(s){s.checkIn=t;s.status=st;}
  ST.syncing=true;render();
  const url=await upload(b64toFile(ST.checkInPhoto,"checkin.jpg"));
  const note=document.getElementById("ciNote")?.value||"";
  // ✅ บันทึก URL รูปใน Firebase ด้วย
  await fbSet(`attendance/${todayISO}/${me.name}`,{checkIn:t,status:st,photoUrl:url||"",name:me.name,role:me.role});
  if(s)s.checkInPhoto=url||ST.checkInPhoto;
  // ✅ ส่ง GAS พร้อม date ที่ถูกต้อง (todayISO ไทย)
  await gasPost("checkIn",{date:todayISO,name:me.name,role:me.role,checkInTime:t,status:st,photoUrl:url||"",note});
  ST.syncing=false;ST.checkInPhoto=null;
  if(late&&ST.settings.notifLate)addN(`⚠️ ${me.name} มาสาย (เช็คอิน ${t})`,true);
  else addN(`${me.name} เช็คอิน ${t}`);
  render();
}

async function doCO(){
  if(!ST.checkOutPhoto)return;const me=ST.loginUser;
  const t=fmtTime(thaiNow());
  const s=STAFF.find(x=>x.id===me.id);if(s){s.checkOut=t;s.status="เลิกงานแล้ว";}
  ST.syncing=true;render();
  const url=await upload(b64toFile(ST.checkOutPhoto,"checkout.jpg"));
  // ✅ บันทึก checkOutPhotoUrl แยกจาก photoUrl (checkIn)
  await fbUp(`attendance/${todayISO}/${me.name}`,{checkOut:t,status:"เลิกงานแล้ว",checkOutPhotoUrl:url||""});
  if(s)s.checkOutPhoto=url||ST.checkOutPhoto;
  // ✅ ส่ง GAS พร้อม date ที่ถูกต้อง
  await gasPost("checkOut",{date:todayISO,name:me.name,checkOutTime:t,checkOutStatus:"เลิกงานแล้ว",photoUrl:url||"",note:""});
  ST.syncing=false;ST.checkOutPhoto=null;addN(`${me.name} เช็คเอาต์ ${t}`);render();
}

// ── Staff Photo Modal ──
function openStaffModal(name){ST.staffModal=name;render();}

function openT(id){ST.taskModal=id;ST.taskPhotos[id]=[];ST.taskAI=null;ST.taskAnalyzing=false;render();}
function closeM(){ST.taskModal=null;ST.leaveModal=false;ST.fineModal=null;render();}

async function subT(id,isLate){
  const photos=ST.taskPhotos[id]||[];if(!photos.length)return;
  const note=document.getElementById("tNote")?.value||"",ai=ST.taskAI;
  const photoUrl=photos.map(p=>p.url||p.preview).filter(Boolean).join(",");
  const t=allTasks().find(x=>x.id===id)||WEEKLY_TODAY.find(x=>x.id===id)||WEEKLY_ALL.find(x=>x.id===id);
  const late=isLate||isTimePast(t?.deadline);
  const now3=thaiNow();const submittedAt=fmtTime(now3);
  const patch={status:"รอตรวจ",submittedAt,note,photoUrl,aiScore:ai?.score,aiStatus:ai?.status,isLate:late};
  updateAllArr(id,patch);ST.taskModal=null;ST.syncing=true;render();
  if(t?.category==="weekly"){
    await fbSet(`weeklyTasks/${weekISO}/${id}`,{...patch,name:t.name,assignee:t.assignee||ST.loginUser.name,deadline:t.deadline,dayName:t.dayName||DOW_TH[todayDow]});
    await gasPost("weeklyTask",{weekStr:weekISO,date:todayISO,dayName:t.dayName||DOW_TH[todayDow],taskName:t.name,deadline:t.deadline||"",assignee:t.assignee||ST.loginUser.name,submittedAt,status:"รอตรวจ",isLate:late,photoUrl,note});
  }else{
    await fbSet(`tasks/${todayISO}/${id}`,{...patch,name:t?.name||id,assignee:t?.assignee||ST.loginUser.name,round:t?.round||"",category:t?.category||"daily"});
    await gasPost("submitTask",{date:todayISO,taskName:t?.name||id,assignee:t?.assignee||ST.loginUser.name,round:t?.round||"",category:t?.category||"daily",time:t?.time||"",deadline:t?.deadline||"",submittedAt,status:"รอตรวจ",isLate:late,photoUrl,aiScore:ai?.score,aiStatus:ai?.status,note});
  }
  ST.syncing=false;
  if(ST.settings.notifTask)addN(`งานรอตรวจ: ${t?.name||id}${late?" (ส่งเลยเวลา)":""}`);
  render();
}

async function appT(id){
  const t=allTasks().find(x=>x.id===id)||WEEKLY_TODAY.find(x=>x.id===id);
  updateAllArr(id,{status:"ผ่าน"});
  if(t?.category==="weekly")await fbUp(`weeklyTasks/${weekISO}/${id}`,{status:"ผ่าน",reviewer:ST.loginUser.name});
  else await fbUp(`tasks/${todayISO}/${id}`,{status:"ผ่าน",reviewer:ST.loginUser.name});
  await gasPost("approveTask",{date:todayISO,taskName:t?.name||id,category:t?.category||"daily",status:"ผ่าน",reviewer:ST.loginUser.name});render();
}
async function rejT(id){
  const t=allTasks().find(x=>x.id===id)||WEEKLY_TODAY.find(x=>x.id===id);
  updateAllArr(id,{status:"ตีกลับ"});
  if(t?.category==="weekly")await fbUp(`weeklyTasks/${weekISO}/${id}`,{status:"ตีกลับ",reviewer:ST.loginUser.name});
  else await fbUp(`tasks/${todayISO}/${id}`,{status:"ตีกลับ",reviewer:ST.loginUser.name});
  await gasPost("approveTask",{date:todayISO,taskName:t?.name||id,category:t?.category||"daily",status:"ตีกลับ",reviewer:ST.loginUser.name});
  addN(`งาน "${t?.name||id}" ถูกตีกลับ`,true);render();
}

// ── สุขภาพแมว ──
function prevCatP(inp,cat){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{if(!ST.catLogs[cat])ST.catLogs[cat]={};ST.catLogs[cat].photoPreview=e.target.result;ST.catLogs[cat].photoFile=f;render();};r.readAsDataURL(f);}
function openCat(cat){if(!ST.catLogs[cat])ST.catLogs[cat]={};ST.catModal=cat;render();}
async function saveCat(cat){
  const log=ST.catLogs[cat]||{};const note=document.getElementById("catNote")?.value||"";const detail=document.getElementById("abnDetail")?.value||"";const urg=document.getElementById("urgency")?.value||"";
  ST.syncing=true;render();let photoUrl="";if(log.photoFile)photoUrl=await upload(log.photoFile)||"";
  const t=fmtTime(thaiNow());
  const data={status:"รอตรวจ",time:t,note,abnormal:log.abnormal||false,abnormalDetail:detail,urgency:urg,photoUrl,recordedBy:ST.loginUser.name};
  ST.catLogs[cat]={...log,...data};
  await fbSet(`catHealth/${todayISO}/${cat}`,data);
  ST.catModal=null;await gasPost("catHealth",{date:todayISO,time:t,catName:cat,recordedBy:ST.loginUser.name,abnormal:log.abnormal,abnormalDetail:detail,urgency:urg,note,photoUrl});
  ST.syncing=false;
  if(log.abnormal&&ST.settings.notifCat)addN(`⚠️ แมว ${cat} พบความผิดปกติ!`,true);
  else addN(`🐱 แมว ${cat} รอตรวจ`);render();
}
async function approveCat(cat){await fbUp(`catHealth/${todayISO}/${cat}`,{status:"ผ่าน",reviewer:ST.loginUser.name});ST.catModal=null;addN(`✅ สุขภาพแมว ${cat} ผ่าน`);render();}
async function rejectCat(cat){await fbUp(`catHealth/${todayISO}/${cat}`,{status:"ตีกลับ",reviewer:ST.loginUser.name});ST.catModal=null;addN(`❌ สุขภาพแมว ${cat} ตีกลับ`,true);render();}

// ── ลูกแมว ──
function openKitten(id){ST.kittenModal=id;ST.kittenForm={time:fmtTime(thaiNow()),weight:"",milk:"",wetFood:"",poop:"",pee:"",bloated:"",note:"",photoPreview:null};render();}
function prevKP(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{ST.kittenForm.photoPreview=e.target.result;ST.kittenForm.photoFile=f;render();};r.readAsDataURL(f);}
async function saveKitten(id){
  const f={time:document.getElementById("kTime")?.value||fmtTime(thaiNow()),weight:document.getElementById("kWeight")?.value||"",milk:ST.kittenForm.milk,wetFood:ST.kittenForm.wetFood,poop:ST.kittenForm.poop,pee:ST.kittenForm.pee,bloated:ST.kittenForm.bloated,note:document.getElementById("kNote")?.value||"",recordedBy:ST.loginUser.name};
  ST.syncing=true;render();let photoUrl="";if(ST.kittenForm.photoFile)photoUrl=await upload(ST.kittenForm.photoFile)||"";
  f.photoUrl=photoUrl;ST.kittenLogs[id]=[...(ST.kittenLogs[id]||[]),f];ST.kittenModal=null;
  const k=KITTENS.find(x=>x.id===id);await gasPost("kittenLog",{date:todayISO,...f,kittenName:k?.name||id,photoUrl});
  ST.syncing=false;render();
}

// ── Settings ──
async function saveSettings(){await fbSet(`settings/appSettings`,{lateFine:ST.settings.lateFine,noTaskFine:ST.settings.noTaskFine,overtimeFine:ST.settings.overtimeFine,notifLate:ST.settings.notifLate,notifTask:ST.settings.notifTask,notifLeave:ST.settings.notifLeave,notifCat:ST.settings.notifCat});}

function exportCSV(){
  const rows=[["ชื่อ","ค่าแรง/วัน","เข้างาน","เลิกงาน","สถานะ","ยอดสุทธิ"]];
  STAFF.filter(s=>s.role==="staff").forEach(s=>{const u=USERS.find(x=>x.id===s.id);const w=u?.wage||0;const fine=s.status==="มาสาย"?ST.settings.lateFine:0;const net=s.checkIn?Math.max(0,w-fine):0;rows.push([s.name,w,s.checkIn||"-",s.checkOut||"-",s.status,net]);});
  const csv=rows.map(r=>r.join(",")).join("\n");const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));a.download=`mori-${todayISO}.csv`;a.click();
}
