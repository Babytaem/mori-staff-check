async function gas(action,data){
  try{await fetch(GAS,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({action,data})});}
  catch(e){console.error(e);}
}

async function upload(file){
  const fd=new FormData();
  fd.append("file",file);fd.append("upload_preset",PRESET);fd.append("folder","mori-staff-check");
  try{const r=await fetch(`https://api.cloudinary.com/v1_1/${CLD}/image/upload`,{method:"POST",body:fd});const j=await r.json();return j.secure_url||null;}
  catch(e){return null;}
}

function b64toFile(d,n){
  const a=d.split(","),m=a[0].match(/:(.*?);/)[1],s=atob(a[1]);
  let l=s.length;const u=new Uint8Array(l);
  while(l--){u[l]=s.charCodeAt(l);}
  return new File([u],n,{type:m});
}

  if(st==="มาสาย")return"b-or";
  if(st==="เลิกงานแล้ว")return"b-bl";
  return"b-gy";
}

// Actions
function selUser(id){S.loginUser=USERS.find(u=>u.id===id);S.pinInput="";S.loginError="";render();}
function backSel(){S.loginUser=null;S.pinInput="";S.loginError="";render();}
function logout(){S.loggedIn=false;S.loginUser=null;S.pinInput="";render();}
function pinPress(d){
  if(d==="⌫"){S.pinInput=S.pinInput.slice(0,-1);render();return;}
  if(d==="")return;
  S.pinInput+=d;render();
  if(S.pinInput.length===4){
    if(S.pinInput===S.loginUser.pin){S.loggedIn=true;S.loginError="";}
    else{S.loginError="PIN ไม่ถูกต้อง";S.pinInput="";}
    render();
  }
}
function readN(id){S.notifs=S.notifs.map(n=>n.id===id?{...n,read:true}:n);render();}
function addNotif(msg,urgent=false){S.notifs.unshift({id:Date.now(),msg,time:tStr,read:false,urgent});}

function handleCI(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{S.checkInPhoto=e.target.result;render();};r.readAsDataURL(f);}
function handleCO(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{S.checkOutPhoto=e.target.result;render();};r.readAsDataURL(f);}
function handleTP(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    S.taskPhotoPreview=e.target.result;S.taskPhotoUrl=null;S.taskAI=null;S.taskAnalyzing=true;render();
    upload(f).then(url=>{S.taskPhotoUrl=url||e.target.result;S.taskAI=mockAI();S.taskAnalyzing=false;render();});
  };r.readAsDataURL(f);
}

async function doCI(){
  if(!S.checkInPhoto)return;
  const me=S.loginUser;
  const h=now.getHours(),m=now.getMinutes();
  const late=h*60+m>11*60+30;
  const st=late?"มาสาย":"เข้างานแล้ว";
  const s=STAFF.find(x=>x.id===me.id);
  if(s){s.checkIn=tStr;s.status=st;}
  S.syncing=true;render();
  const f=b64toFile(S.checkInPhoto,"checkin.jpg");
  const url=await upload(f);
  await gas("checkIn",{date:todayISO,name:me.name,role:me.role,checkInTime:tStr,status:st,photoUrl:url||"",note:document.getElementById("ciNote")?.value||""});
  S.syncing=false;S.checkInPhoto=null;
  addNotif(`${me.name} เช็คอิน ${tStr}${late?" (สาย)":""}`,late);
  render();
}

async function doCO(){
  if(!S.checkOutPhoto)return;
  const me=S.loginUser;
  const s=STAFF.find(x=>x.id===me.id);
  if(s){s.checkOut=tStr;s.status="เลิกงานแล้ว";}
  S.syncing=true;render();
  const f=b64toFile(S.checkOutPhoto,"checkout.jpg");
  const url=await upload(f);
  await gas("checkOut",{date:todayISO,name:me.name,checkOutTime:tStr,status:"เลิกงานแล้ว",photoUrl:url||""});
  S.syncing=false;S.checkOutPhoto=null;
  addNotif(`${me.name} เช็คเอาต์ ${tStr}`);
  render();
}

function openTask(id){S.taskModal=id;S.taskPhotoPreview=null;S.taskPhotoUrl=null;S.taskAI=null;S.taskAnalyzing=false;render();}
function openDTask(id){S.taskModal=id;S.taskPhotoPreview=null;S.taskPhotoUrl=null;S.taskAI=null;S.taskAnalyzing=false;render();}
function openBTask(id){S.taskModal=id;S.taskPhotoPreview=null;S.taskPhotoUrl=null;S.taskAI=null;S.taskAnalyzing=false;render();}
function openGenTask(type,id){S.taskModal=id;S.taskPhotoPreview=null;S.taskPhotoUrl=null;S.taskAI=null;S.taskAnalyzing=false;render();}
function closeModal(){S.taskModal=null;S.leaveModal=false;render();}

async function subTask(id){
  if(!S.taskPhotoUrl&&!S.taskPhotoPreview)return;
  const note=document.getElementById("tNote")?.value||"";
  const ai=S.taskAI;
  const updateArr=(arr)=>arr.map(t=>t.id===id?{...t,status:"รอตรวจ",submittedAt:tStr,note,photoUrl:S.taskPhotoUrl,aiScore:ai?.score,aiStatus:ai?.status,aiNote:ai?.note}:t);
  TASKS=updateArr(TASKS);DAILY_TASKS=updateArr(DAILY_TASKS);BARISTA_TASKS=updateArr(BARISTA_TASKS);
  BATHROOM_TASKS=updateArr(BATHROOM_TASKS);KITCHEN_TASKS=updateArr(KITCHEN_TASKS);
  const t=[...TASKS,...DAILY_TASKS,...BARISTA_TASKS,...BATHROOM_TASKS,...KITCHEN_TASKS].find(x=>x.id===id);
  S.syncing=true;S.taskModal=null;render();
  await gas("submitTask",{
    date:todayISO,taskName:t?.name||id,
    assignee:t?.assignee||S.loginUser.name,
    round:t?.round||t?.time||"รายวัน",
    deadline:t?.deadline||t?.time||"",
    submittedAt:tStr,status:"รอตรวจ",
    photoUrl:S.taskPhotoUrl||"",
    aiScore:ai?.score,aiStatus:ai?.status,note
  });
  S.syncing=false;
  addNotif(`มีงานรอตรวจ: ${t?.name||id}`);
  render();
}

async function appTask(id){
  const updateArr=(arr)=>arr.map(t=>t.id===id?{...t,status:"ผ่าน"}:t);
  TASKS=updateArr(TASKS);DAILY_TASKS=updateArr(DAILY_TASKS);BARISTA_TASKS=updateArr(BARISTA_TASKS);
  BATHROOM_TASKS=updateArr(BATHROOM_TASKS);KITCHEN_TASKS=updateArr(KITCHEN_TASKS);
  const t=TASKS.find(x=>x.id===id)||DAILY_TASKS.find(x=>x.id===id);
  await gas("approveTask",{date:todayISO,taskName:t?.name||id,status:"ผ่าน",reviewer:S.loginUser.name});
  render();
}

async function rejTask(id){
  const updateArr=(arr)=>arr.map(t=>t.id===id?{...t,status:"ตีกลับ"}:t);
  TASKS=updateArr(TASKS);DAILY_TASKS=updateArr(DAILY_TASKS);BARISTA_TASKS=updateArr(BARISTA_TASKS);
  BATHROOM_TASKS=updateArr(BATHROOM_TASKS);KITCHEN_TASKS=updateArr(KITCHEN_TASKS);
  const t=TASKS.find(x=>x.id===id)||DAILY_TASKS.find(x=>x.id===id);
  await gas("approveTask",{date:todayISO,taskName:t?.name||id,status:"ตีกลับ",reviewer:S.loginUser.name});
  addNotif(`งาน "${t?.name||id}" ถูกตีกลับ`,true);
  render();
}

function subLeave(){
  const type=document.getElementById("lType")?.value;
  const reason=document.getElementById("lReason")?.value;
  gas("leaveRequest",{date:todayISO,name:S.loginUser.name,type,reason});
  S.leaveModal=false;
  addNotif("มีคำขอลางานรอการอนุมัติ");
  render();
}

function toggleAbn(v){S.catLogs[S.catModal]={...S.catLogs[S.catModal],abnormal:v};render();}
function prevCatPhoto(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{S.catLogs[S.catModal]={...S.catLogs[S.catModal],photoPreview:e.target.result,photoFile:f};render();};
  r.readAsDataURL(f);
}
async function saveCat(cat){
  const log=S.catLogs[cat]||{};
  const note=document.getElementById("catNote")?.value||"";
  const detail=document.getElementById("abnDetail")?.value||"";
  const urgency=document.getElementById("urgency")?.value||"";
  // ถ่ายรูปแมว
  const fileInput=document.getElementById("catPhotoFile");
  let photoUrl="";
  if(fileInput?.files[0]){
    S.syncing=true;render();
    photoUrl=await upload(fileInput.files[0])||"";
  }
  S.catLogs[cat]={...log,checked:true,time:tStr,note,abnormalDetail:detail,urgency,photoUrl};
  S.syncing=true;S.catModal=null;render();
  await gas("catHealth",{date:todayISO,time:tStr,catName:cat,recordedBy:S.loginUser.name,overall:"ปกติ",abnormal:log.abnormal,abnormalDetail:detail,urgency,note,photoUrl});
  S.syncing=false;
  if(log.abnormal)addNotif(`⚠️ แมว ${cat} พบความผิดปกติ!`,true);
  render();
}

function prevKPhoto(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{S.kittenForm={...S.kittenForm,photoPreview:e.target.result,photoFile:f};render();};
  r.readAsDataURL(f);
}

function openKitten(id){S.kittenModal=id;S.kittenForm={time:tStr,weight:"",milk:"",wetFood:"",poop:"",pee:"",bloated:"",note:"",photoPreview:null};render();}
async function saveKitten(id){
  const f={
    time:document.getElementById("kTime")?.value||tStr,
    weight:document.getElementById("kWeight")?.value||"",
    milk:S.kittenForm.milk,wetFood:S.kittenForm.wetFood,
    poop:S.kittenForm.poop,pee:S.kittenForm.pee,
    bloated:S.kittenForm.bloated,
    note:document.getElementById("kNote")?.value||"",
    recordedBy:S.loginUser.name,
  };
  if(!f.time)return;
  // ถ่ายรูปลูกแมว
  const kFile=document.getElementById("kPhotoFile");
  let photoUrl="";
  if(kFile?.files[0]){
    S.syncing=true;render();
    photoUrl=await upload(kFile.files[0])||"";
  }
  f.photoUrl=photoUrl;
  S.kittenLogs[id]=[...(S.kittenLogs[id]||[]),f];
  S.syncing=true;S.kittenModal=null;render();
  const k=KITTENS.find(x=>x.id===id);
  await gas("kittenLog",{date:todayISO,...f,kittenName:k?.name||id,photoUrl});
  S.syncing=false;render();
}

function exportCSV(){
  const rows=[["ชื่อ","ค่าแรง/วัน","เข้างาน","เลิกงาน","สถานะ","ค่าแรง","ยอดสุทธิ"]];
  STAFF.filter(s=>s.role==="staff").forEach(s=>{
    const u=USERS.find(x=>x.id===s.id);
    const w=u?.wage||0;
    const net=s.checkIn?w:0;
    rows.push([s.name,w,s.checkIn||"-",s.checkOut||"-",s.status,net,net]);
  });
  const csv=rows.map(r=>r.join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`mori-report-${todayISO}.csv`;
  a.click();
}

render();
