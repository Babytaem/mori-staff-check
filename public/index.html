// สัปดาห์ปัจจุบัน (จันทร์-อาทิตย์)
function getWeekISO(){
  const d=new Date(nowTs);d.setHours(0,0,0,0);
  const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);
  d.setDate(diff);return d.toISOString().slice(0,10);
}
const weekISO=getWeekISO();

// ══ ตรวจสอบว่าเลยเวลาหรือยัง ══
function isTimePast(hhmm){
  if(!hhmm||hhmm==="ก่อนเลิกงาน")return false;
  const[h,m]=hhmm.split(":").map(Number);
  const now_min=nowTs.getHours()*60+nowTs.getMinutes();
  const task_min=h*60+m;
  return now_min>task_min;
}

    if(leaves){ST.leaveRequests=Object.entries(leaves).map(([id,d])=>({id,...d}));}
    const hol=await fbGet(`settings/holidayMode`);
    if(hol!==null)ST.holidayMode=hol;
    ST.fbConnected=true;
  }catch(e){ST.fbConnected=false;}
  render();startListening();
}

function startListening(){
  fbListen(`attendance/${todayISO}`,(att)=>{
    if(!att)return;
    Object.entries(att).forEach(([name,data])=>{const s=STAFF.find(x=>x.name===name);if(s){s.checkIn=data.checkIn||null;s.checkOut=data.checkOut||null;s.status=data.status||"ยังไม่เข้างาน";}});
    ST.fbConnected=true;render();
  });
  fbListen(`tasks/${todayISO}`,(tasks)=>{
    if(!tasks)return;
    Object.entries(tasks).forEach(([id,data])=>updateAllArr(id,data));render();
  });
  fbListen(`weeklyTasks/${weekISO}`,(wk)=>{
    if(!wk)return;
    Object.entries(wk).forEach(([id,data])=>updateAllArr(id,data));render();
  });
  fbListen(`catHealth/${todayISO}`,(cats)=>{
    if(!cats)return;
    Object.entries(cats).forEach(([name,data])=>{ST.catLogs[name]=data;});render();
  });
  fbListen(`leaveRequests`,(leaves)=>{
    if(!leaves)return;
    ST.leaveRequests=Object.entries(leaves).map(([id,d])=>({id,...d}));render();
  });
  fbListen(`settings/holidayMode`,(val)=>{if(val!==null&&ST.holidayMode!==val){ST.holidayMode=val;render();}});
}

async function gas(a,d){try{await fetch(GAS,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:a,data:d})});}catch(e){}}
async function upload(file){const fd=new FormData();fd.append("file",file);fd.append("upload_preset",PRESET);fd.append("folder","mori-staff-check");try{const r=await fetch(`https://api.cloudinary.com/v1_1/${CLD}/image/upload`,{method:"POST",body:fd});const j=await r.json();return j.secure_url||null;}catch(e){return null;}}
function b64toFile(d,n){const a=d.split(","),m=a[0].match(/:(.*?);/)[1],s=atob(a[1]);let l=s.length;const u=new Uint8Array(l);while(l--){u[l]=s.charCodeAt(l);}return new File([u],n,{type:m});}

function bc(st){
  if(["ผ่าน","เข้างานแล้ว","อนุมัติ"].includes(st))return"background:#EAF3DE;color:#639922";
  if(["รอตรวจ","ส่งแล้ว","รออนุมัติ"].includes(st))return"background:#FAEEDA;color:#BA7517";
  if(["ตีกลับ","เลยเวลา","ลืมงาน","ไม่อนุมัติ"].includes(st))return"background:#FCEBEB;color:#A32D2D";
  if(st==="มาสาย")return"background:#FAECE7;color:#D85A30";
  if(st==="เลิกงานแล้ว")return"background:#E6F1FB;color:#185FA5";
  if(st==="งานเลยเวลา")return"background:#FCEBEB;color:#A32D2D";
  if(st==="อนุโลม")return"background:#E6F1FB;color:#185FA5";
  return"background:#F1EFE8;color:#888780";
}
function addN(msg,urgent){ST.notifs.unshift({id:Date.now(),msg,time:tStr,read:false,urgent:!!urgent});}
function tStat(arr){return{total:arr.length,done:arr.filter(t=>t.status==="ผ่าน").length,pending:arr.filter(t=>t.status==="รอตรวจ").length,todo:arr.filter(t=>t.status==="ยังไม่ทำ").length,rej:arr.filter(t=>["ตีกลับ","เลยเวลา","ลืมงาน"].includes(t.status)).length,late:arr.filter(t=>t.status==="ยังไม่ทำ"&&isTimePast(t.deadline)).length};}
function catStat(){const vals=Object.values(ST.catLogs).filter(l=>l?.status);const passed=vals.filter(l=>l.status==="ผ่าน").length;const pending=vals.filter(l=>l.status==="รอตรวจ").length;const abn=vals.filter(l=>l.abnormal).length;return{total:CATS.length,checked:vals.length,passed,pending,abnormal:abn};}

// สถานะจริงของ task (รวมการตรวจว่าเลยเวลาหรือยัง)
function getTaskStatus(t){
  if(t.status!=="ยังไม่ทำ")return t.status;
  if(isTimePast(t.deadline))return"เลยเวลา";
  return"ยังไม่ทำ";
}

        </div>
        ${log.photoPreview?`<button class="btn" style="background:#993556;color:#fff;margin-top:0" onclick="saveCat('${cat}')">📸 ส่งตรวจ</button>`
          :`<div style="background:#E8E3DA;border-radius:10px;padding:10px;text-align:center;font-size:12px;color:#888780">📷 ถ่ายรูปก่อนจึงจะส่งได้ค่ะ</div>`}
      `:""}
      <button class="btn" style="background:#F1EFE8;color:#888780" onclick="ST.catModal=null;render()">ปิด</button>
    </div></div>`;
  }

  // Kitten Modal
  if(ST.kittenModal){
    const k=KITTENS.find(x=>x.id===ST.kittenModal),logs=ST.kittenLogs[k.id]||[],f=ST.kittenForm;
    modal=`<div class="modal" onclick="if(event.target===this){ST.kittenModal=null;render()}"><div class="mc">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-size:24px">${k.emoji}</span>
        <div><div style="font-weight:500;font-size:15px;color:#993556">${k.name}</div><div style="font-size:11px;color:#5F5E5A">บันทึกวันนี้ ${logs.length} ครั้ง</div></div>
      </div>
      ${logs.length>0?`<div style="margin-bottom:12px">${[...logs].reverse().slice(0,2).map(l=>`<div style="background:#FAF7F2;border-radius:10px;padding:8px;margin-bottom:6px;font-size:11px">
        <div style="font-weight:500;margin-bottom:3px">⏰ ${l.time}${l.weight?` · ⚖️${l.weight}g`:""}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px"><span>นมแม่: ${l.milk||"—"}</span><span>เปียก: ${l.wetFood||"—"}</span><span>อึ: ${l.poop||"—"}</span><span>ฉี่: ${l.pee||"—"}</span></div>
      </div>`).join("")}</div>`:""}
      <div style="background:#FBEAF0;border-radius:12px;padding:12px">
        <div style="font-size:13px;font-weight:500;color:#993556;margin-bottom:10px">+ บันทึกรอบใหม่</div>
        <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">
          <span style="font-size:12px;color:#5F5E5A;white-space:nowrap">⏰ เวลา</span>
          <input type="time" id="kTime" value="${f.time}" style="flex:1;border:.5px solid #F4C0D1;background:#fff"/>
          <button onclick="ST.kittenForm.time='${tStr}';render()" style="background:#993556;color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap">ตอนนี้</button>
        </div>
        <div style="background:#fff;border-radius:10px;padding:8px 10px;margin-bottom:10px;display:flex;align-items:center;gap:8px">
          <span style="font-size:20px">⚖️</span>
          <div style="flex:1"><div style="font-size:11px;color:#5F5E5A">น้ำหนัก (กรัม)</div>
          <input type="number" id="kWeight" placeholder="เช่น 125" value="${f.weight}" style="border:none;font-size:15px;font-weight:500;outline:none;background:transparent;width:100%"/></div>
        </div>
        ${[["milk","🍼 กินนมแม่ไหม",["ใช่","ไม่","กินนิดหน่อย"]],["wetFood","🥩 กินเปียกหมดไหม",["หมด","กินบางส่วน","ไม่กิน"]],["poop","💩 อึ",["ใช่","ไม่","ช่วยบีบ"]],["pee","💧 ฉี่",["ใช่","ไม่","ช่วยบีบ"]],["bloated","🫃 ท้องอืดไหม",["ไม่อืด","อืดเล็กน้อย","อืดมาก"]]].map(([key,label,opts])=>`
          <div style="margin-bottom:10px"><div style="font-size:12px;font-weight:500;margin-bottom:5px">${label}</div>
          <div style="display:flex;gap:6px">${opts.map(opt=>`<button onclick="ST.kittenForm['${key}']='${opt}';render()" style="flex:1;padding:7px 4px;border-radius:8px;border:.5px solid ${f[key]===opt?"#993556":"#F4C0D1"};font-size:11px;cursor:pointer;background:${f[key]===opt?"#993556":"#fff"};color:${f[key]===opt?"#fff":"#2C2C2A"};font-family:inherit">${opt}</button>`).join("")}</div></div>`).join("")}
        <textarea id="kNote" placeholder="หมายเหตุ เช่น ซึมผิดปกติ..." style="border:.5px solid #F4C0D1;background:#fff;margin-bottom:10px;height:50px">${f.note}</textarea>
        <div style="margin-bottom:10px">
          <div style="font-size:12px;font-weight:500;color:#A32D2D;margin-bottom:5px">📸 ถ่ายรูปลูกแมว/ตาชั่ง (บังคับ)</div>
          <input type="file" id="kFile" accept="image/*" capture="environment" style="display:none" onchange="prevKP(this)"/>
          ${f.photoPreview?`<img src="${f.photoPreview}" style="width:100%;border-radius:10px;max-height:160px;object-fit:cover;margin-bottom:6px;display:block"/>
            <button onclick="ST.kittenForm.photoPreview=null;render()" style="background:#FCEBEB;color:#A32D2D;border:none;border-radius:8px;padding:4px 12px;font-size:11px;cursor:pointer;font-family:inherit">ถ่ายใหม่</button>`
            :`<button class="pb" onclick="document.getElementById('kFile').click()">📷 ถ่ายรูปก่อนบันทึกรอบนี้ (บังคับ)</button>`}
        </div>
        ${f.photoPreview?`<button class="btn" style="background:#993556;color:#fff;margin-top:0" onclick="saveKitten('${k.id}')">✅ บันทึกรอบนี้</button>`
          :`<div style="background:#E8E3DA;border-radius:10px;padding:10px;text-align:center;font-size:12px;color:#888780">📷 ถ่ายรูปก่อนจึงจะบันทึกได้ค่ะ</div>`}
      </div>
      <button class="btn" style="background:#F1EFE8;color:#888780" onclick="ST.kittenModal=null;render()">ปิด</button>
    </div></div>`;
  }

  return hdr+notifPanel+content+modal+nav;
}

// ══════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════
function selU(id){ST.loginUser=USERS.find(u=>u.id===id);ST.pinInput="";ST.loginError="";render();}
function backSel(){ST.loginUser=null;ST.pinInput="";ST.loginError="";render();}
function logout(){ST.loggedIn=false;ST.loginUser=null;ST.pinInput="";render();}
function pinP(d){
  if(d==="⌫"){ST.pinInput=ST.pinInput.slice(0,-1);render();return;}
  if(d==="")return;
  ST.pinInput+=d;render();
  if(ST.pinInput.length===4){if(ST.pinInput===ST.loginUser.pin){ST.loggedIn=true;ST.loginError="";}else{ST.loginError="PIN ไม่ถูกต้อง";ST.pinInput="";}render();}
}
async function toggleHol(){if(!confirm(ST.holidayMode?"ยืนยันเปิดร้านปกติ?":"ยืนยันตั้งเป็นวันหยุดร้าน?"))return;ST.holidayMode=!ST.holidayMode;await fbSet(`settings/holidayMode`,ST.holidayMode);addN(ST.holidayMode?"🏖️ ตั้งเป็นวันหยุดร้านแล้ว":"✅ เปิดร้านปกติแล้ว",ST.holidayMode);render();}

function handleCI(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{ST.checkInPhoto=e.target.result;render();};r.readAsDataURL(f);}
function handleCO(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{ST.checkOutPhoto=e.target.result;render();};r.readAsDataURL(f);}
function handleTP(inp){
  const files=Array.from(inp.files);if(!files.length)return;
  if(!ST.taskPhotos[ST.taskModal])ST.taskPhotos[ST.taskModal]=[];
  ST.taskAnalyzing=true;render();let done=0;
  files.forEach(file=>{const r=new FileReader();r.onload=e=>{
    ST.taskPhotos[ST.taskModal].push({preview:e.target.result,url:null,file});done++;
    if(done===files.length){Promise.all(ST.taskPhotos[ST.taskModal].filter(p=>!p.url).map(p=>upload(p.file).then(url=>{p.url=url||p.preview;}))).then(()=>{ST.taskAI=mockAI();ST.taskAnalyzing=false;render();});}
  };r.readAsDataURL(file);});
}

async function doCI(){
  if(!ST.checkInPhoto)return;const me=ST.loginUser;
  const h=nowTs.getHours(),m=nowTs.getMinutes();const late=h*60+m>11*60+30;const st=late?"มาสาย":"เข้างานแล้ว";
  const s=STAFF.find(x=>x.id===me.id);if(s){s.checkIn=tStr;s.status=st;}
  ST.syncing=true;render();
  const url=await upload(b64toFile(ST.checkInPhoto,"checkin.jpg"));const note=document.getElementById("ciNote")?.value||"";
  await fbSet(`attendance/${todayISO}/${me.name}`,{checkIn:tStr,status:st,photoUrl:url||"",name:me.name,role:me.role});
  await gas("checkIn",{date:todayISO,name:me.name,role:me.role,checkInTime:tStr,status:st,photoUrl:url||"",note});
  ST.syncing=false;ST.checkInPhoto=null;addN(`${me.name} เช็คอิน ${tStr}${late?" (สาย)":""}`,late);render();
}

async function doCO(){
  if(!ST.checkOutPhoto)return;const me=ST.loginUser;
  const s=STAFF.find(x=>x.id===me.id);if(s){s.checkOut=tStr;s.status="เลิกงานแล้ว";}
  ST.syncing=true;render();
  const url=await upload(b64toFile(ST.checkOutPhoto,"checkout.jpg"));
  await fbUpdate(`attendance/${todayISO}/${me.name}`,{checkOut:tStr,status:"เลิกงานแล้ว",checkOutPhotoUrl:url||""});
  // ✅ ส่ง GAS ครบทั้ง checkout พร้อมรูปและเวลา
  await gas("checkOut",{date:todayISO,name:me.name,checkOutTime:tStr,checkOutStatus:"เลิกงานแล้ว",photoUrl:url||"",note:""});
  ST.syncing=false;ST.checkOutPhoto=null;addN(`${me.name} เช็คเอาต์ ${tStr}`);render();
}

function openT(id){ST.taskModal=id;ST.taskPhotos[id]=[];ST.taskAI=null;ST.taskAnalyzing=false;render();}
function closeM(){ST.taskModal=null;ST.leaveModal=false;ST.fineModal=null;render();}

async function subT(id,isLate){
  const photos=ST.taskPhotos[id]||[];if(!photos.length)return;
  const note=document.getElementById("tNote")?.value||"",ai=ST.taskAI;
  const photoUrl=photos.map(p=>p.url||p.preview).filter(Boolean).join(",");
  const t=allTasks().find(x=>x.id===id)||WEEKLY_TODAY.find(x=>x.id===id)||WEEKLY_ALL.find(x=>x.id===id);
  const late=(isLate==="true")||isTimePast(t?.deadline);
  const patch={status:"รอตรวจ",submittedAt:tStr,note,photoUrl,aiScore:ai?.score,aiStatus:ai?.status,isLate:late};
  updateAllArr(id,patch);ST.taskModal=null;ST.syncing=true;render();
  if(t?.category==="weekly"){
    await fbSet(`weeklyTasks/${weekISO}/${id}`,{...patch,name:t.name,assignee:t.assignee||ST.loginUser.name,deadline:t.deadline,dayName:t.dayName||DOW_TH[todayDow]});
    await gas("weeklyTask",{weekStr:weekISO,date:todayISO,dayName:t.dayName||DOW_TH[todayDow],taskName:t.name,deadline:t.deadline||"",assignee:t.assignee||ST.loginUser.name,submittedAt:tStr,status:"รอตรวจ",isLate:late,photoUrl,note});
  }else{
    await fbSet(`tasks/${todayISO}/${id}`,{...patch,name:t?.name||id,assignee:t?.assignee||ST.loginUser.name,round:t?.round||"",category:t?.category||"daily"});
    await gas("submitTask",{date:todayISO,taskName:t?.name||id,assignee:t?.assignee||ST.loginUser.name,round:t?.round||"",category:t?.category||"daily",time:t?.time||"",deadline:t?.deadline||"",submittedAt:tStr,status:"รอตรวจ",isLate:late,photoUrl,aiScore:ai?.score,aiStatus:ai?.status,note});
  }
  ST.syncing=false;addN(`มีงานรอตรวจ: ${t?.name||id}${late?" (ส่งเลยเวลา)":""}`);render();
}

async function appT(id){
  const t=allTasks().find(x=>x.id===id)||WEEKLY_TODAY.find(x=>x.id===id);
  updateAllArr(id,{status:"ผ่าน"});
  if(t?.category==="weekly"){await fbUpdate(`weeklyTasks/${weekISO}/${id}`,{status:"ผ่าน",reviewer:ST.loginUser.name});}
  else{await fbUpdate(`tasks/${todayISO}/${id}`,{status:"ผ่าน",reviewer:ST.loginUser.name});}
  await gas("approveTask",{date:todayISO,taskName:t?.name||id,category:t?.category||"daily",status:"ผ่าน",reviewer:ST.loginUser.name});
  render();
}
async function rejT(id){
  const t=allTasks().find(x=>x.id===id)||WEEKLY_TODAY.find(x=>x.id===id);
  updateAllArr(id,{status:"ตีกลับ"});
  if(t?.category==="weekly"){await fbUpdate(`weeklyTasks/${weekISO}/${id}`,{status:"ตีกลับ",reviewer:ST.loginUser.name});}
  else{await fbUpdate(`tasks/${todayISO}/${id}`,{status:"ตีกลับ",reviewer:ST.loginUser.name});}
  await gas("approveTask",{date:todayISO,taskName:t?.name||id,category:t?.category||"daily",status:"ตีกลับ",reviewer:ST.loginUser.name});
  addN(`งาน "${t?.name||id}" ถูกตีกลับ`,true);render();
}

// ── ค่าปรับ ──
function openFine(name,type,orig){ST.fineModal={name,fineType:type,fineOriginal:orig};render();}
async function saveFine(name,type,orig){
  const amt=parseFloat(document.getElementById("fineAmt")?.value||0);
  const status=document.getElementById("fineStatus")?.value||"หักค่าปรับ";
  const note=document.getElementById("fineNote")?.value||"";
  await gas("fineDecision",{date:todayISO,name,fineType:type,fineOriginal:orig,fineAmount:amt,fineStatus:status,fineNote:note,decidedBy:ST.loginUser.name});
  ST.fineModal=null;addN(`💰 ${status}: ${name} · ${status==="อนุโลม"?"ไม่หักค่าปรับ ("+note+")":`฿${amt}`}`);render();
}

// ── คำขอลา ──
async function subLeave(){
  const type=document.getElementById("lType")?.value,reason=document.getElementById("lReason")?.value;
  const id=`leave_${Date.now()}`;
  await fbSet(`leaveRequests/${id}`,{id,name:ST.loginUser.name,type,reason,date:todayISO,status:"รออนุมัติ"});
  await gas("leaveRequest",{date:todayISO,name:ST.loginUser.name,type,reason});
  ST.leaveModal=false;addN(`${ST.loginUser.name} ยื่นคำขอ: ${type}`);render();
}
async function approveLeave(id,status){
  await fbUpdate(`leaveRequests/${id}`,{status,approvedBy:ST.loginUser.name});
  await gas("approveLeave",{name:"",status,approvedBy:ST.loginUser.name});
  addN(`${status==="อนุมัติ"?"✅":"❌"} คำขอลา ${status} แล้ว`);render();
}

// ── สุขภาพแมว ──
function prevCatP(inp,cat){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{if(!ST.catLogs[cat])ST.catLogs[cat]={};ST.catLogs[cat].photoPreview=e.target.result;ST.catLogs[cat].photoFile=f;render();};r.readAsDataURL(f);}
function openCat(cat){if(!ST.catLogs[cat])ST.catLogs[cat]={};ST.catModal=cat;render();}
async function saveCat(cat){
  const log=ST.catLogs[cat]||{};const note=document.getElementById("catNote")?.value||"";const detail=document.getElementById("abnDetail")?.value||"";const urg=document.getElementById("urgency")?.value||"";
  ST.syncing=true;render();let photoUrl="";if(log.photoFile){photoUrl=await upload(log.photoFile)||"";}
  const data={status:"รอตรวจ",time:tStr,note,abnormal:log.abnormal||false,abnormalDetail:detail,urgency:urg,photoUrl,recordedBy:ST.loginUser.name};
  ST.catLogs[cat]={...log,...data,checked:true};
  await fbSet(`catHealth/${todayISO}/${cat}`,data);
  ST.catModal=null;await gas("catHealth",{date:todayISO,time:tStr,catName:cat,recordedBy:ST.loginUser.name,abnormal:log.abnormal,abnormalDetail:detail,urgency:urg,note,photoUrl});
  ST.syncing=false;if(log.abnormal)addN(`⚠️ แมว ${cat} พบความผิดปกติ!`,true);render();
}
async function approveCat(cat){await fbUpdate(`catHealth/${todayISO}/${cat}`,{status:"ผ่าน",reviewer:ST.loginUser.name});ST.catModal=null;addN(`✅ สุขภาพแมว ${cat} ผ่านแล้ว`);render();}
async function rejectCat(cat){await fbUpdate(`catHealth/${todayISO}/${cat}`,{status:"ตีกลับ",reviewer:ST.loginUser.name});ST.catModal=null;addN(`❌ สุขภาพแมว ${cat} ถูกตีกลับ`,true);render();}

// ── ลูกแมว ──
function openKitten(id){ST.kittenModal=id;ST.kittenForm={time:tStr,weight:"",milk:"",wetFood:"",poop:"",pee:"",bloated:"",note:"",photoPreview:null};render();}
function prevKP(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{ST.kittenForm.photoPreview=e.target.result;ST.kittenForm.photoFile=f;render();};r.readAsDataURL(f);}
async function saveKitten(id){
  const f={time:document.getElementById("kTime")?.value||tStr,weight:document.getElementById("kWeight")?.value||"",milk:ST.kittenForm.milk,wetFood:ST.kittenForm.wetFood,poop:ST.kittenForm.poop,pee:ST.kittenForm.pee,bloated:ST.kittenForm.bloated,note:document.getElementById("kNote")?.value||"",recordedBy:ST.loginUser.name};
  if(!f.time)return;ST.syncing=true;render();let photoUrl="";if(ST.kittenForm.photoFile){photoUrl=await upload(ST.kittenForm.photoFile)||"";}
  f.photoUrl=photoUrl;ST.kittenLogs[id]=[...(ST.kittenLogs[id]||[]),f];ST.kittenModal=null;
  const k=KITTENS.find(x=>x.id===id);await gas("kittenLog",{date:todayISO,...f,kittenName:k?.name||id,photoUrl});
  ST.syncing=false;render();
}

// ── Export ──
function exportCSV(){
  const rows=[["ชื่อ","ค่าแรง/วัน","เข้างาน","เลิกงาน","สถานะ","ยอดสุทธิ"]];
  STAFF.filter(s=>s.role==="staff").forEach(s=>{const u=USERS.find(x=>x.id===s.id);const w=u?.wage||0;const fine=s.status==="มาสาย"?ST.settings.lateFine:0;const net=s.checkIn?Math.max(0,w-fine):0;rows.push([s.name,w,s.checkIn||"-",s.checkOut||"-",s.status,net]);});
  const csv=rows.map(r=>r.join(",")).join("\n");const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));a.download=`mori-${todayISO}.csv`;a.click();
}

// BOOT
// ══════════════════════════════════════════════
render();loadState();
</script>
