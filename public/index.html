// Firebase helpers
let db=null;
async function initFB(){
  if(db)return db;
  const {initializeApp}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
  const {getDatabase,ref,set,get,onValue,update}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
  const app=initializeApp(FB_CONFIG);
  db=getDatabase(app);
  window._fb={ref,set,get,onValue,update,db};
  return db;
}

async function fbSet(path,data){
  try{
    await initFB();
    const {ref,set,db}=window._fb;
    await set(ref(db,path),data);
  }catch(e){console.error("fbSet:",e);}
}

async function fbUpdate(path,data){
  try{
    await initFB();
    const {ref,update,db}=window._fb;
    await update(ref(db,path),data);
  }catch(e){console.error("fbUpdate:",e);}
}

async function fbGet(path){
  try{
    await initFB();
    const {ref,get,db}=window._fb;
    const snap=await get(ref(db,path));
    return snap.exists()?snap.val():null;
  }catch(e){console.error("fbGet:",e);return null;}
}

function fbListen(path,cb){
  initFB().then(()=>{
    const {ref,onValue,db}=window._fb;
    onValue(ref(db,path),snap=>{cb(snap.exists()?snap.val():null);});
  });
}

// Load state from Firebase on start
async function loadState(){
  const today=todayISO;
  // โหลดสถานะพนักงาน
  const att=await fbGet(`attendance/${today}`);
  if(att){
    Object.entries(att).forEach(([name,data])=>{
      const s=STAFF.find(x=>x.name===name);
      if(s){s.checkIn=data.checkIn||null;s.checkOut=data.checkOut||null;s.status=data.status||"ยังไม่เข้างาน";}
    });
  }
  // โหลดสถานะงาน
  const tasks=await fbGet(`tasks/${today}`);
  if(tasks){
    Object.entries(tasks).forEach(([id,data])=>{
      const upd=(arr)=>arr.map(t=>t.id===id?{...t,...data}:t);
      TASKS=upd(TASKS);DAILY_TASKS=upd(DAILY_TASKS);BARISTA_TASKS=upd(BARISTA_TASKS);
      BATHROOM_TASKS=upd(BATHROOM_TASKS);KITCHEN_TASKS=upd(KITCHEN_TASKS);
    });
  }
  // Start app
render();
loadState().then(()=>startListening());
}

// Listen realtime updates
function startListening(){
  const today=todayISO;
  // ฟังสถานะพนักงาน
  fbListen(`attendance/${today}`,(att)=>{
    if(!att)return;
    Object.entries(att).forEach(([name,data])=>{
      const s=STAFF.find(x=>x.name===name);
      if(s){s.checkIn=data.checkIn||null;s.checkOut=data.checkOut||null;s.status=data.status||"ยังไม่เข้างาน";}
    });
    render();
  });
  // ฟังสถานะงาน
  fbListen(`tasks/${today}`,(tasks)=>{
    if(!tasks)return;
    Object.entries(tasks).forEach(([id,data])=>{
      const upd=(arr)=>arr.map(t=>t.id===id?{...t,...data}:t);
      TASKS=upd(TASKS);DAILY_TASKS=upd(DAILY_TASKS);BARISTA_TASKS=upd(BARISTA_TASKS);
      BATHROOM_TASKS=upd(BATHROOM_TASKS);KITCHEN_TASKS=upd(KITCHEN_TASKS);
    });
    render();
  });
  // ฟัง holiday mode
  fbListen(`settings/holidayMode`,(val)=>{
    if(val!==null&&ST.holidayMode!==val){ST.holidayMode=val;render();}
  });
}

}

// ── MAIN ──
function main(){

  const unread=ST.notifs.filter(n=>!n.read).length;

  const doneT=TASKS.filter(t=>t.status==="ผ่าน");

  // Header
  const hdr=`<div class="hdr">
    <div><h1 style="font-size:16px;font-weight:500;color:#993556">🐱 Mori Staff Check</h1><small style="font-size:11px;color:#5F5E5A">${dStr}</small></div>
    <div style="display:flex;gap:8px;align-items:center">
      ${ST.syncing?`<span class="sync">⏳</span>`:""}
      ${me.role==="owner"||me.role==="manager"?`<button onclick="toggleHol()" style="background:${ST.holidayMode?"#EAF3DE":"#FAEEDA"};color:${ST.holidayMode?"#639922":"#BA7517"};border:none;border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:inherit">${ST.holidayMode?"✓ วันหยุด":"🏖️ ตั้งวันหยุด"}</button>`:""}
      <div style="position:relative;cursor:pointer" onclick="ST.showNotif=!ST.showNotif;render()">
        <span style="font-size:20px">🔔</span>
        ${unread>0?`<span style="position:absolute;top:-4px;right:-4px;background:#A32D2D;color:#fff;font-size:9px;border-radius:10px;padding:1px 4px">${unread}</span>`:""}
      </div>
      <div style="display:flex;align-items:center;gap:6px;background:#FBEAF0;border-radius:20px;padding:5px 12px;cursor:pointer" onclick="logout()">
        <div class="av" style="width:22px;height:22px;font-size:9px">${me.avatar}</div>
        <span style="font-size:11px;color:#993556">${me.name.split(" ")[0]}</span>
      </div>
    </div>
  </div>`;

  const notifPanel=ST.showNotif?`<div style="background:#fff;border-bottom:.5px solid #E8E3DA;max-height:200px;overflow-y:auto">
    ${ST.notifs.map(n=>`<div style="padding:10px 14px;border-bottom:.5px solid #E8E3DA;background:${n.read?"#fff":"#FBEAF0"};cursor:pointer" onclick="ST.notifs=ST.notifs.map(x=>x.id===${n.id}?{...x,read:true}:x);render()">
      <div style="font-size:12px;color:${n.urgent?"#A32D2D":"#2C2C2A"}">${n.urgent?"🔴":"🔔"} ${n.msg}</div>
      <div style="font-size:10px;color:#5F5E5A">${n.time}</div>
    </div>`).join("")}
  </div>`:"";

  const NAVS=[{k:"today",i:"🏠",l:"วันนี้"},{k:"checkin",i:"⏰",l:"เข้างาน"},{k:"tasks",i:"✅",l:"เช็คงาน"},{k:"cats",i:"🐱",l:"สุขภาพแมว"},{k:"report",i:"📊",l:"รายงาน"},{k:"settings",i:"⚙️",l:"ตั้งค่า"}];

  let content="";
  let modal="";

  // ── TODAY ──
  if(ST.tab==="today"){
    const chk=STAFF.filter(s=>s.checkIn&&!s.checkOut).length;
    const notIn=STAFF.filter(s=>!s.checkIn).length;
    const late=STAFF.filter(s=>s.status==="มาสาย").length;
    content=`<div class="pad">
      <div class="g2">
        <div class="sb" style="background:#EAF3DE"><div style="font-size:22px;font-weight:500;color:#639922">${chk}</div><div style="font-size:11px;color:#639922">เข้างานแล้ว</div></div>
        <div class="sb" style="background:#F1EFE8"><div style="font-size:22px;font-weight:500;color:#888780">${notIn}</div><div style="font-size:11px;color:#888780">ยังไม่เข้างาน</div></div>
        <div class="sb" style="background:#FAECE7"><div style="font-size:22px;font-weight:500;color:#D85A30">${late}</div><div style="font-size:11px;color:#D85A30">มาสาย</div></div>
        <div class="sb" style="background:#FCEBEB"><div style="font-size:22px;font-weight:500;color:#A32D2D">${overdueT.length}</div><div style="font-size:11px;color:#A32D2D">งานเลยเวลา</div></div>

      <div class="sec">สถานะพนักงาน</div>

        <div class="sec">งานรอตรวจ (${pendingT.length})</div>

          <div style="display:flex;justify-content:space-between;align-items:center">
            <div><div style="font-size:12px;font-weight:500">${t.name}</div><div style="font-size:10px;color:#5F5E5A">${t.assignee} · ${t.round}</div></div>

              <button onclick="event.stopPropagation();appT('${t.id}')" class="badge" style="${bc("ผ่าน")};border:none;cursor:pointer;padding:5px 10px">ผ่าน</button>
              <button onclick="event.stopPropagation();rejT('${t.id}')" class="badge" style="${bc("ตีกลับ")};border:none;cursor:pointer;padding:5px 10px">ตีกลับ</button>
            </div>
          </div>
        </div>`).join("")}`:""}
      <div class="sec">สรุปงานวันนี้</div>
      <div class="card">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
          <div><div style="font-size:18px;font-weight:500">${TASKS.length}</div><div style="font-size:10px;color:#5F5E5A">ทั้งหมด</div></div>
          <div><div style="font-size:18px;font-weight:500;color:#639922">${doneT.length}</div><div style="font-size:10px;color:#5F5E5A">ผ่านแล้ว</div></div>
          <div><div style="font-size:18px;font-weight:500;color:#A32D2D">${overdueT.length}</div><div style="font-size:10px;color:#5F5E5A">เลยเวลา</div></div>
        </div>
        <div class="pb2"><div class="pf" style="width:${Math.round(doneT.length/TASKS.length*100)}%;background:#639922"></div></div>
        <div style="font-size:10px;color:#5F5E5A">ความคืบหน้า ${Math.round(doneT.length/TASKS.length*100)}%</div>
      </div>
    </div>`;
  }

  // ── CHECKIN ──
  else if(ST.tab==="checkin"){
    content=`<div class="pad">
      <div class="card" style="text-align:center">
        <div class="av" style="width:60px;height:60px;font-size:22px;margin:0 auto 10px">${me.avatar}</div>
        <div style="font-size:16px;font-weight:500">${me.name}</div>
        <div style="font-size:28px;font-weight:500;color:#993556;margin:8px 0">${tStr}</div>
        <div style="font-size:12px;color:#5F5E5A">${dStr}</div>
        <div style="margin-top:10px"><span class="badge" style="${bc(my.status||"ยังไม่เข้างาน")}">${my.status||"ยังไม่เข้างาน"}</span></div>
        <div style="font-size:10px;color:#5F5E5A;margin-top:6px">เข้างาน 11:30 น. · เลิกงานไม่เกิน 02:00 น.</div>
      </div>
      ${!my.checkIn?`<div class="card">
        <div style="font-size:12px;color:#5F5E5A;margin-bottom:8px">📸 ถ่ายเซลฟี่เช็คอิน (บังคับ)</div>
        <input type="file" id="ciFile" accept="image/*" capture="environment" style="display:none" onchange="handleCI(this)"/>
        ${ST.checkInPhoto?`<img src="${ST.checkInPhoto}" style="width:100%;border-radius:10px;max-height:180px;object-fit:cover;margin-bottom:8px;display:block"/>
          <button onclick="ST.checkInPhoto=null;render()" style="background:#FCEBEB;color:#A32D2D;border:none;border-radius:8px;padding:4px 12px;font-size:11px;cursor:pointer;font-family:inherit;margin-bottom:8px">ถ่ายใหม่</button>`
          :`<button class="pb" onclick="document.getElementById('ciFile').click()">📷 ถ่ายรูป/เลือกรูป</button>`}
        <textarea id="ciNote" placeholder="หมายเหตุ (ถ้ามี) เช่น รถติด, ป่วย..." style="margin-bottom:8px"></textarea>
        <button class="btn" style="background:${ST.checkInPhoto?"#993556":"#E8E3DA"};color:${ST.checkInPhoto?"#fff":"#aaa"};cursor:${ST.checkInPhoto?"pointer":"not-allowed"}" ${!ST.checkInPhoto?"disabled":""} onclick="${ST.checkInPhoto?"doCI()":""}">
          ${ST.checkInPhoto?"✓ เช็คอินเข้างาน":"กรุณาถ่ายรูปก่อนเช็คอิน"}
        </button>
      </div>`
      :!my.checkOut?`<div class="card">
        <div style="background:#EAF3DE;border-radius:10px;padding:10px;margin-bottom:10px;font-size:12px;color:#639922;font-weight:500">✓ เช็คอินแล้ว เวลา ${my.checkIn}</div>
        <div style="font-size:12px;color:#5F5E5A;margin-bottom:8px">📸 ถ่ายเซลฟี่เช็คเอาต์ (บังคับ)</div>
        <input type="file" id="coFile" accept="image/*" capture="environment" style="display:none" onchange="handleCO(this)"/>
        ${ST.checkOutPhoto?`<img src="${ST.checkOutPhoto}" style="width:100%;border-radius:10px;max-height:180px;object-fit:cover;margin-bottom:8px;display:block"/>
          <button onclick="ST.checkOutPhoto=null;render()" style="background:#FCEBEB;color:#A32D2D;border:none;border-radius:8px;padding:4px 12px;font-size:11px;cursor:pointer;font-family:inherit;margin-bottom:8px">ถ่ายใหม่</button>`
          :`<button class="pb" onclick="document.getElementById('coFile').click()">📷 ถ่ายรูป/เลือกรูป</button>`}
        <button class="btn" style="background:${ST.checkOutPhoto?"#444":"#E8E3DA"};color:${ST.checkOutPhoto?"#fff":"#aaa"};cursor:${ST.checkOutPhoto?"pointer":"not-allowed"}" ${!ST.checkOutPhoto?"disabled":""} onclick="${ST.checkOutPhoto?"doCO()":""}">
          ${ST.checkOutPhoto?"✓ เช็คเอาต์เลิกงาน":"กรุณาถ่ายรูปก่อนเช็คเอาต์"}
        </button>
      </div>`
      :`<div class="card"><div style="background:#E6F1FB;border-radius:10px;padding:10px;font-size:12px;color:#185FA5;font-weight:500">✓ เช็คเอาต์แล้ว เวลา ${my.checkOut} · ขอบคุณสำหรับวันนี้! 🐱</div></div>`}

      ${STAFF.map(s=>`<div class="card" style="display:flex;align-items:center;gap:10px">
        <div class="av" style="width:36px;height:36px;font-size:12px">${s.avatar}</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:500">${s.name}</div><div style="font-size:11px;color:#5F5E5A">${s.checkIn?`เข้า ${s.checkIn}${s.checkOut?` · เลิก ${s.checkOut}`:""}` :"ยังไม่เช็คอิน"}</div></div>
        <span class="badge" style="${bc(s.status)}">${s.status}</span>
      </div>`).join("")}
      <button class="btn" style="background:#FBEAF0;color:#993556;border:.5px solid #F4C0D1;margin-top:4px" onclick="ST.leaveModal=true;render()">+ ยื่นคำขอลา / แจ้งเหตุ</button>
    </div>`;
  }

  // ── TASKS ──
  else if(ST.tab==="tasks"){
    const tabs=[["round","รอบงาน"],["daily","งานรายวัน"],["barista","บาริสต้า"],["bathroom","ห้องน้ำ"],["kitchen","ห้องครัว"]];
    content=`<div class="pad">
      <div class="tabs">${tabs.map(([k,l])=>`<button class="tab ${ST.taskTab===k?"active":""}" onclick="ST.taskTab='${k}';render()">${l}</button>`).join("")}</div>
      ${ST.taskTab==="round"?ROUNDS.map((r,ri)=>{
        const rt=TASKS.filter(t=>t.round===r.time);
        const dn=rt.filter(t=>["ผ่าน","รอตรวจ","ส่งแล้ว"].includes(t.status)).length;
        return`<div class="card">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px"><b>รอบ ${r.time}</b><span style="font-size:11px;color:#5F5E5A">${dn}/${rt.length}</span></div>
          <div class="pb2"><div class="pf" style="width:${Math.round(dn/rt.length*100)}%;background:${dn===rt.length?"#639922":"#993556"}"></div></div>

      ${ST.taskTab==="daily"?`<div class="card">
        ${DAILY_TASKS.map(t=>`<div class="tr" onclick="openT('${t.id}')">
          <div><div style="font-size:12px">${t.name}</div>${t.submittedAt?`<div style="font-size:10px;color:#5F5E5A">ส่ง ${t.submittedAt}</div>`:""}</div>
          <div style="display:flex;gap:4px;align-items:center">${t.photoUrl?`<span>📸</span>`:""}
          <span class="badge" style="${bc(t.status)}">${t.status}</span></div>
        </div>`).join("")}
      </div>`:""}
      ${ST.taskTab==="barista"?`<div class="card">
        ${BARISTA_TASKS.map(t=>`<div class="tr" onclick="openT('${t.id}')">
          <div><div style="font-size:12px">${t.name}</div><div style="font-size:10px;color:#5F5E5A">${t.time}${t.submittedAt?` · ส่ง ${t.submittedAt}`:""}</div></div>
          <div style="display:flex;gap:4px;align-items:center">${t.photoUrl?`<span>📸</span>`:""}
          <span class="badge" style="${bc(t.status)}">${t.status}</span></div>
        </div>`).join("")}
      </div>`:""}
      ${ST.taskTab==="bathroom"?`<div class="sec">กดรายการเพื่อถ่ายรูปส่ง</div>

          <div style="display:flex;justify-content:space-between;align-items:center">
            <div><div style="font-size:13px">${t.name}</div>${t.submittedAt?`<div style="font-size:10px;color:#5F5E5A">ส่งแล้ว ${t.submittedAt}</div>`:""}</div>
            <div style="display:flex;gap:4px;align-items:center">${t.photoUrl?`<span>📸</span>`:""}
            <span class="badge" style="${bc(t.status)}">${t.status}</span></div>
          </div>
        </div>`).join("")}`:""}
      ${ST.taskTab==="kitchen"?`<div class="sec">กดรายการเพื่อถ่ายรูปส่ง</div>
        ${KITCHEN_TASKS.map(t=>`<div class="card" style="cursor:pointer" onclick="openT('${t.id}')">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div><div style="font-size:13px">${t.name}</div>${t.submittedAt?`<div style="font-size:10px;color:#5F5E5A">ส่งแล้ว ${t.submittedAt}</div>`:""}</div>
            <div style="display:flex;gap:4px;align-items:center">${t.photoUrl?`<span>📸</span>`:""}
            <span class="badge" style="${bc(t.status)}">${t.status}</span></div>
          </div>
        </div>`).join("")}`:""}
    </div>`;
  }

  // ── CATS ──
  else if(ST.tab==="cats"){
    content=`<div class="pad">
      <div class="card" style="background:#FBEAF0">
        <div style="font-size:12px;font-weight:500;color:#993556;margin-bottom:6px">⭐ แมวต้องเช็ดตาด้วยน้ำอุ่นทุกวัน</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">${SPECIAL.map(c=>`<span class="badge" style="background:#fff;color:#993556;border:.5px solid #F4C0D1">${c}</span>`).join("")}</div>

      </div>
      <div class="sec">🍼 ลูกแมวพิเศษ</div>
      ${KITTENS.map(k=>{
        const logs=ST.kittenLogs[k.id]||[];
        return`<div class="card" style="cursor:pointer;border:.5px solid #F4C0D1" onclick="openKitten('${k.id}')">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:28px">${k.emoji}</span>
            <div style="flex:1"><div style="font-size:13px;font-weight:500;color:#993556">${k.name}</div>
            <div style="font-size:11px;color:#5F5E5A">บันทึกวันนี้: ${logs.length} ครั้ง${logs.length>0?` · ล่าสุด ${logs[logs.length-1].time}`:""}</div></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">

          <div style="display:flex;justify-content:space-between"><span style="font-size:12px">🐱 ${c}</span><span style="font-size:10px;color:#5F5E5A">#${i+1}</span></div>
          ${l?`<div style="font-size:10px;color:${l.abnormal?"#A32D2D":"#639922"};margin-top:2px">${l.abnormal?"⚠️ พบความผิดปกติ":"✓ เช็คแล้ว"}</div>`:""}

      </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px">
              <span>นมแม่: ${l.milk||"—"}</span><span>เปียก: ${l.wetFood||"—"}</span>
              <span>อึ: ${l.poop||"—"}</span><span>ฉี่: ${l.pee||"—"}</span>
            </div>
          </div>`).join("")}
        </div>`:""}
        <div style="background:#FBEAF0;border-radius:12px;padding:12px">
          <div style="font-size:13px;font-weight:500;color:#993556;margin-bottom:10px">+ บันทึกรอบใหม่</div>
          <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">
            <span style="font-size:12px;color:#5F5E5A;white-space:nowrap">⏰ เวลา</span>
            <input type="time" id="kTime" value="${f.time}" style="flex:1;border:.5px solid #F4C0D1;background:#fff"/>
            <button onclick="ST.kittenForm.time='${tStr}';document.getElementById('kTime').value='${tStr}'" style="background:#993556;color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap">ตอนนี้</button>
          </div>
          <div style="background:#fff;border-radius:10px;padding:8px 10px;margin-bottom:10px;display:flex;align-items:center;gap:8px">
            <span style="font-size:20px">⚖️</span>
            <div style="flex:1"><div style="font-size:11px;color:#5F5E5A">น้ำหนัก (กรัม)</div>
            <input type="number" id="kWeight" placeholder="เช่น 125" value="${f.weight}" style="border:none;font-size:15px;font-weight:500;outline:none;background:transparent;width:100%"/></div>
          </div>
          ${[["milk","🍼 กินนมแม่ไหม",["ใช่","ไม่","กินนิดหน่อย"]],["wetFood","🥩 กินเปียกหมดไหม",["หมด","กินบางส่วน","ไม่กิน"]],["poop","💩 อึ",["ใช่","ไม่","ช่วยบีบ"]],["pee","💧 ฉี่",["ใช่","ไม่","ช่วยบีบ"]],["bloated","🫃 ท้องอืดไหม",["ไม่อืด","อืดเล็กน้อย","อืดมาก"]]].map(([key,label,opts])=>`
            <div style="margin-bottom:10px">
              <div style="font-size:12px;font-weight:500;margin-bottom:5px">${label}</div>
              <div style="display:flex;gap:6px">${opts.map(opt=>`<button onclick="ST.kittenForm['${key}']='${opt}';render()" style="flex:1;padding:7px 4px;border-radius:8px;border:.5px solid ${f[key]===opt?"#993556":"#F4C0D1"};font-size:11px;cursor:pointer;background:${f[key]===opt?"#993556":"#fff"};color:${f[key]===opt?"#fff":"#2C2C2A"};font-family:inherit">${opt}</button>`).join("")}</div>
            </div>`).join("")}
          <textarea id="kNote" placeholder="หมายเหตุ เช่น ซึมผิดปกติ..." style="border:.5px solid #F4C0D1;background:#fff;margin-bottom:10px;height:50px">${f.note}</textarea>
          <div style="margin-bottom:10px">
            <div style="font-size:12px;font-weight:500;color:#A32D2D;margin-bottom:5px">📸 ถ่ายรูปลูกแมว/ตาชั่ง (บังคับ)</div>
            <input type="file" id="kFile" accept="image/*" capture="environment" style="display:none" onchange="prevKP(this)"/>
            ${f.photoPreview
              ?`<img src="${f.photoPreview}" style="width:100%;border-radius:10px;max-height:160px;object-fit:cover;margin-bottom:6px;display:block"/>
                <button onclick="ST.kittenForm.photoPreview=null;render()" style="background:#FCEBEB;color:#A32D2D;border:none;border-radius:8px;padding:4px 12px;font-size:11px;cursor:pointer;font-family:inherit">ถ่ายใหม่</button>`
              :`<button class="pb" onclick="document.getElementById('kFile').click()">📷 ถ่ายรูปก่อนบันทึกรอบนี้ (บังคับ)</button>`}
          </div>
          ${f.photoPreview
            ?`<button class="btn" style="background:#993556;color:#fff;margin-top:0" onclick="saveKitten('${k.id}')">✅ บันทึกรอบนี้</button>`
            :`<div style="background:#E8E3DA;border-radius:10px;padding:10px;text-align:center;font-size:12px;color:#888780">📷 ถ่ายรูปก่อนจึงจะบันทึกได้ค่ะ</div>`}
        </div>
        <button class="btn" style="background:#F1EFE8;color:#888780" onclick="ST.kittenModal=null;render()">ปิด</button>
      </div>
    </div>`;
  }

  return hdr+notifPanel+content+modal+nav;
}

// ── ACTIONS ──
function selU(id){ST.loginUser=USERS.find(u=>u.id===id);ST.pinInput="";ST.loginError="";render();}
function backSel(){ST.loginUser=null;ST.pinInput="";ST.loginError="";render();}
function logout(){ST.loggedIn=false;ST.loginUser=null;ST.pinInput="";render();}
function pinP(d){
  if(d==="⌫"){ST.pinInput=ST.pinInput.slice(0,-1);render();return;}
  if(d==="")return;
  ST.pinInput+=d;render();
  if(ST.pinInput.length===4){
    if(ST.pinInput===ST.loginUser.pin){ST.loggedIn=true;ST.loginError="";}
    else{ST.loginError="PIN ไม่ถูกต้อง";ST.pinInput="";}
    render();
  }
}
async function toggleHol(){
  if(!confirm(ST.holidayMode?"ยืนยันเปิดร้านปกติ?":"ยืนยันตั้งเป็นวันหยุดร้าน?"))return;
  ST.holidayMode=!ST.holidayMode;
  await fbSet(`settings/holidayMode`,ST.holidayMode);
  addN(ST.holidayMode?"🏖️ ตั้งเป็นวันหยุดร้านแล้ว":"✅ เปิดร้านปกติแล้ว",ST.holidayMode);
  render();
}

function handleCI(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{ST.checkInPhoto=e.target.result;render();};r.readAsDataURL(f);}
function handleCO(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{ST.checkOutPhoto=e.target.result;render();};r.readAsDataURL(f);}
function handleTP(inp){
  const files=Array.from(inp.files);if(!files.length)return;
  if(!ST.taskPhotos[ST.taskModal])ST.taskPhotos[ST.taskModal]=[];
  ST.taskAnalyzing=true;render();
  let done=0;
  files.forEach(file=>{
    const r=new FileReader();
    r.onload=e=>{
      ST.taskPhotos[ST.taskModal].push({preview:e.target.result,url:null,file});
      done++;
      if(done===files.length){
        const arr=ST.taskPhotos[ST.taskModal];
        Promise.all(arr.filter(p=>!p.url).map(p=>upload(p.file).then(url=>{p.url=url||p.preview;}))).then(()=>{
          ST.taskAI=mockAI();ST.taskAnalyzing=false;render();
        });
      }
    };r.readAsDataURL(file);
  });
}

async function doCI(){
  if(!ST.checkInPhoto)return;
  const me=ST.loginUser;
  const h=now.getHours(),m=now.getMinutes();
  const late=h*60+m>11*60+30;
  const st=late?"มาสาย":"เข้างานแล้ว";
  const s=STAFF.find(x=>x.id===me.id);
  if(s){s.checkIn=tStr;s.status=st;}
  ST.syncing=true;render();
  const url=await upload(b64toFile(ST.checkInPhoto,"checkin.jpg"));
  const data={checkIn:tStr,status:st,photoUrl:url||"",name:me.name,role:me.role};
  // บันทึกลง Firebase (realtime)
  await fbSet(`attendance/${todayISO}/${me.name}`,data);
  // บันทึกลง Google Sheets (สำรอง)
  await gas("checkIn",{date:todayISO,...data,note:document.getElementById("ciNote")?.value||""});
  ST.syncing=false;ST.checkInPhoto=null;
  addN(`${me.name} เช็คอิน ${tStr}${late?" (สาย)":""}`,late);
  render();
}

async function doCO(){
  if(!ST.checkOutPhoto)return;
  const me=ST.loginUser;
  const s=STAFF.find(x=>x.id===me.id);
  if(s){s.checkOut=tStr;s.status="เลิกงานแล้ว";}
  ST.syncing=true;render();
  const url=await upload(b64toFile(ST.checkOutPhoto,"checkout.jpg"));
  const data={checkOut:tStr,status:"เลิกงานแล้ว",checkOutPhotoUrl:url||""};
  await fbUpdate(`attendance/${todayISO}/${me.name}`,data);
  await gas("checkOut",{date:todayISO,name:me.name,checkOutTime:tStr,status:"เลิกงานแล้ว",photoUrl:url||""});
  ST.syncing=false;ST.checkOutPhoto=null;
  addN(`${me.name} เช็คเอาต์ ${tStr}`);
  render();
}

function openT(id){ST.taskModal=id;ST.taskPhotos[id]=[];ST.taskAI=null;ST.taskAnalyzing=false;render();}
function closeM(){ST.taskModal=null;ST.leaveModal=false;render();}

async function subT(id){
  const photos=ST.taskPhotos[id]||[];
  if(!photos.length)return;
  const note=document.getElementById("tNote")?.value||"";
  const ai=ST.taskAI;
  const photoUrl=photos.map(p=>p.url||p.preview).filter(Boolean).join(",");
  const taskData={status:"รอตรวจ",submittedAt:tStr,note,photoUrl,aiScore:ai?.score,aiStatus:ai?.status};
  const upd=(arr)=>arr.map(t=>t.id===id?{...t,...taskData}:t);
  TASKS=upd(TASKS);DAILY_TASKS=upd(DAILY_TASKS);BARISTA_TASKS=upd(BARISTA_TASKS);
  BATHROOM_TASKS=upd(BATHROOM_TASKS);KITCHEN_TASKS=upd(KITCHEN_TASKS);
  const t=allTasks().find(x=>x.id===id);
  ST.taskModal=null;ST.syncing=true;render();
  // บันทึกลง Firebase (realtime)
  await fbSet(`tasks/${todayISO}/${id}`,{...taskData,name:t?.name||id,assignee:t?.assignee||ST.loginUser.name,round:t?.round||"รายวัน"});
  // บันทึกลง Google Sheets (สำรอง)
  await gas("submitTask",{date:todayISO,taskName:t?.name||id,assignee:t?.assignee||ST.loginUser.name,round:t?.round||"รายวัน",submittedAt:tStr,status:"รอตรวจ",photoUrl,aiScore:ai?.score,aiStatus:ai?.status,note});
  ST.syncing=false;addN(`มีงานรอตรวจ: ${t?.name||id}`);render();
}

async function appT(id){
  const upd=(arr)=>arr.map(t=>t.id===id?{...t,status:"ผ่าน"}:t);
  TASKS=upd(TASKS);DAILY_TASKS=upd(DAILY_TASKS);BARISTA_TASKS=upd(BARISTA_TASKS);
  BATHROOM_TASKS=upd(BATHROOM_TASKS);KITCHEN_TASKS=upd(KITCHEN_TASKS);
  const t=allTasks().find(x=>x.id===id);
  await fbUpdate(`tasks/${todayISO}/${id}`,{status:"ผ่าน",reviewer:ST.loginUser.name});
  await gas("approveTask",{date:todayISO,taskName:t?.name||id,status:"ผ่าน",reviewer:ST.loginUser.name});
  render();
}

async function rejT(id){
  const upd=(arr)=>arr.map(t=>t.id===id?{...t,status:"ตีกลับ"}:t);
  TASKS=upd(TASKS);DAILY_TASKS=upd(DAILY_TASKS);BARISTA_TASKS=upd(BARISTA_TASKS);
  BATHROOM_TASKS=upd(BATHROOM_TASKS);KITCHEN_TASKS=upd(KITCHEN_TASKS);
  const t=allTasks().find(x=>x.id===id);
  await fbUpdate(`tasks/${todayISO}/${id}`,{status:"ตีกลับ",reviewer:ST.loginUser.name});
  await gas("approveTask",{date:todayISO,taskName:t?.name||id,status:"ตีกลับ",reviewer:ST.loginUser.name});
  addN(`งาน "${t?.name||id}" ถูกตีกลับ`,true);render();
}

function subLeave(){
  const type=document.getElementById("lType")?.value;
  const reason=document.getElementById("lReason")?.value;
  gas("leaveRequest",{date:todayISO,name:ST.loginUser.name,type,reason});
  ST.leaveModal=false;addN("มีคำขอลางานรอการอนุมัติ");render();
}

function prevCatP(inp,cat){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{if(!ST.catLogs[cat])ST.catLogs[cat]={};ST.catLogs[cat].photoPreview=e.target.result;ST.catLogs[cat].photoFile=f;render();};r.readAsDataURL(f);}
function openCat(cat){if(!ST.catLogs[cat])ST.catLogs[cat]={};ST.catModal=cat;render();}
async function saveCat(cat){
  const log=ST.catLogs[cat]||{};
  const note=document.getElementById("catNote")?.value||"";
  const detail=document.getElementById("abnDetail")?.value||"";
  const urgency=document.getElementById("urgency")?.value||"";
  ST.syncing=true;render();
  let photoUrl="";
  if(log.photoFile){photoUrl=await upload(log.photoFile)||"";}
  ST.catLogs[cat]={...log,checked:true,time:tStr,note,abnormalDetail:detail,urgency,photoUrl};
  ST.catModal=null;
  await gas("catHealth",{date:todayISO,time:tStr,catName:cat,recordedBy:ST.loginUser.name,abnormal:log.abnormal,abnormalDetail:detail,urgency,note,photoUrl});
  ST.syncing=false;
  if(log.abnormal)addN(`⚠️ แมว ${cat} พบความผิดปกติ!`,true);
  render();
}

function openKitten(id){ST.kittenModal=id;ST.kittenForm={time:tStr,weight:"",milk:"",wetFood:"",poop:"",pee:"",bloated:"",note:"",photoPreview:null};render();}
function prevKP(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{ST.kittenForm.photoPreview=e.target.result;ST.kittenForm.photoFile=f;render();};r.readAsDataURL(f);}
async function saveKitten(id){
  const f={time:document.getElementById("kTime")?.value||tStr,weight:document.getElementById("kWeight")?.value||"",milk:ST.kittenForm.milk,wetFood:ST.kittenForm.wetFood,poop:ST.kittenForm.poop,pee:ST.kittenForm.pee,bloated:ST.kittenForm.bloated,note:document.getElementById("kNote")?.value||"",recordedBy:ST.loginUser.name};
  if(!f.time)return;
  ST.syncing=true;render();
  let photoUrl="";
  if(ST.kittenForm.photoFile){photoUrl=await upload(ST.kittenForm.photoFile)||"";}
  f.photoUrl=photoUrl;
  ST.kittenLogs[id]=[...(ST.kittenLogs[id]||[]),f];
  ST.kittenModal=null;
  const k=KITTENS.find(x=>x.id===id);
  await gas("kittenLog",{date:todayISO,...f,kittenName:k?.name||id,photoUrl});
  ST.syncing=false;render();
}

function exportCSV(){
  const rows=[["ชื่อ","ค่าแรง/วัน","เข้างาน","เลิกงาน","สถานะ","ยอดสุทธิ"]];
  STAFF.filter(s=>s.role==="staff").forEach(s=>{
    const u=USERS.find(x=>x.id===s.id);const w=u?.wage||0;const fine=s.status==="มาสาย"?ST.settings.lateFine:0;const net=s.checkIn?Math.max(0,w-fine):0;
    rows.push([s.name,w,s.checkIn||"-",s.checkOut||"-",s.status,net]);
  });
  const csv=rows.map(r=>r.join(",")).join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));a.download=`mori-${todayISO}.csv`;a.click();
}

render();
</script>
