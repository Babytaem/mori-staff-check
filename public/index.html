async function initFB(){if(_fbReady)return;const{initializeApp}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");const{getDatabase,ref,set,get,onValue,update,remove}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");const app=initializeApp(FB_CFG);const db=getDatabase(app);window._fb={ref,set,get,onValue,update,remove,db};_fbReady=true;}
async function fbSet(p,d){try{await initFB();await window._fb.set(window._fb.ref(window._fb.db,p),d);}catch(e){console.error("fbSet",e);}}
async function fbUp(p,d){try{await initFB();await window._fb.update(window._fb.ref(window._fb.db,p),d);}catch(e){console.error("fbUp",e);}}
async function fbGet(p){try{await initFB();const s=await window._fb.get(window._fb.ref(window._fb.db,p));return s.exists()?s.val():null;}catch(e){return null;}}

function thaiNow(){return new Date();}
function fmtTime(d){return d.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});}
function fmtDate(d){return d.toLocaleDateString("th-TH",{weekday:"long",year:"numeric",month:"long",day:"numeric"});}
function fmtISO(d){const off=7*60,loc=new Date(d.getTime()+off*60000);return loc.toISOString().slice(0,10);}

// ✅ reset ตี 3:30 — เช็คว่าถึงเวลา reset หรือยัง
// วันที่ใช้บันทึก = วันปฏิทินจริง (fmtISO ปกติ)
// แต่ reload เมื่อ: วันปฏิทินเปลี่ยน หรือ เวลาถึง 03:30 (ถ้าวันนี้ยังไม่ได้ reset)
// ── ฟังก์ชัน reset ข้อมูลทั้งวัน (เรียกตี 3:30) ─────────────
async function autoResetAtNight(){
  // บันทึกว่า reset วันไหนแล้ว ป้องกัน reset ซ้ำ
  const resetKey=`mori_reset_${todayISO}`;
  if(localStorage.getItem(resetKey)==="done"){return;}
  console.log("🔄 Auto reset ตี 3:30 สำหรับวัน",todayISO);
  try{
    // ลบ Firebase nodes ของวันนี้
    await fbDel(`tasks/${todayISO}`);
    await fbDel(`catHealth/${todayISO}`);
    await fbDel(`damageLogs/${todayISO}`);
    await fbDel(`kittenLogs/${todayISO}`);
    await fbDel(`taskExtra/${todayISO}`);
    await fbDel(`attendance/${todayISO}`);
    // reset weekly ถ้าวันอาทิตย์
    if(todayDow===0) await fbDel(`weeklyTasks/${weekISO}`);
    localStorage.setItem(resetKey,"done");
    console.log("✅ Auto reset เสร็จแล้ว");
  }catch(e){
    console.error("reset error",e);
  }
}

let _clockInt=null;
function startClock(){
  if(_clockInt)return;
  _clockInt=setInterval(()=>{
    const now=thaiNow();
    ["liveClock","liveClock2"].forEach(id=>{
      const el=document.getElementById(id);if(el)el.textContent=fmtTime(now);
    });
    const currentDate=fmtISO(now);
    const h=now.getHours(),m=now.getMinutes();

    // ✅ ถ้าวันปฏิทินเปลี่ยน → reload
    if(currentDate!==todayISO){
      location.reload();return;
    }

    // ✅ ถ้าตี 3:30+ และยังไม่ได้ reset วันนี้ → reset แล้ว reload
    if((h===3&&m>=30)||h>3){
      const resetKey=`mori_reset_${todayISO}`;
      if(localStorage.getItem(resetKey)!=="done"){
        autoResetAtNight().then(()=>{
          setTimeout(()=>location.reload(),2000);
        });
      }
    }
  },30000);
}

function getWeekISO(){
  const d=new Date(_now);
  d.setHours(0,0,0,0);
  const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);
  d.setDate(diff);
  return fmtISO(d);
}

async function loadState(){
  try{
    const att=await fbGet(`attendance/${todayISO}`);
    if(att){Object.entries(att).forEach(([name,d])=>{const s=STAFF.find(x=>x.name===name);if(s){s.checkIn=d.checkIn||null;s.checkOut=d.checkOut||null;s.status=d.status||"ยังไม่เข้างาน";s.checkInPhoto=d.photoUrl||null;s.checkOutPhoto=d.checkOutPhotoUrl||null;}});}
    const tasks=await fbGet(`tasks/${todayISO}`);
    if(tasks){Object.entries(tasks).forEach(([id,d])=>updateAllArr(id,d));}
    const wk=await fbGet(`weeklyTasks/${weekISO}`);
    if(wk){Object.entries(wk).forEach(([id,d])=>updateAllArr(id,d));}
    const cats=await fbGet(`catHealth/${todayISO}`);
    if(cats){Object.entries(cats).forEach(([name,d])=>{ST.catLogs[name]=d;if(d.checkItems)ST.catCheckItems[name]=d.checkItems;});}
    const leaves=await fbGet(`leaveRequests`);
    if(leaves){ST.leaveRequests=Object.entries(leaves).map(([id,d])=>({id,...d}));}
    const klogs=await fbGet(`kittenLogs/${todayISO}`);
    if(klogs){Object.entries(klogs).forEach(([kid,arr])=>{ST.kittenLogs[kid]=Array.isArray(arr)?arr:Object.values(arr)||[];});}
    const dmg=await fbGet(`damageLogs/${todayISO}`);
    if(dmg){ST.damageLogs=Array.isArray(dmg)?dmg:Object.values(dmg);}
    const extra=await fbGet(`taskExtra/${todayISO}`);
    if(extra){ST.taskExtraData=extra;}
    const hol=await fbGet(`settings/holidayMode`);if(hol!==null)ST.holidayMode=hol;
    const sets=await fbGet(`settings/appSettings`);if(sets)Object.assign(ST.settings,sets);
    ST.fbConnected=true;
  }catch(e){ST.fbConnected=false;}
  render();startListening();startClock();
}

function startListening(){
  fbListen(`attendance/${todayISO}`,(att)=>{if(!att)return;Object.entries(att).forEach(([name,d])=>{const s=STAFF.find(x=>x.name===name);if(s){s.checkIn=d.checkIn||null;s.checkOut=d.checkOut||null;s.status=d.status||"ยังไม่เข้างาน";s.checkInPhoto=d.photoUrl||null;s.checkOutPhoto=d.checkOutPhotoUrl||null;}});ST.fbConnected=true;render();});
  fbListen(`tasks/${todayISO}`,(tasks)=>{if(!tasks)return;Object.entries(tasks).forEach(([id,d])=>updateAllArr(id,d));render();});
  fbListen(`weeklyTasks/${weekISO}`,(wk)=>{if(!wk)return;Object.entries(wk).forEach(([id,d])=>updateAllArr(id,d));render();});
  fbListen(`catHealth/${todayISO}`,(cats)=>{if(!cats)return;Object.entries(cats).forEach(([name,d])=>{ST.catLogs[name]=d;if(d.checkItems)ST.catCheckItems[name]=d.checkItems;});render();});
  fbListen(`leaveRequests`,(leaves)=>{if(!leaves)return;ST.leaveRequests=Object.entries(leaves).map(([id,d])=>({id,...d}));render();});
  fbListen(`settings/holidayMode`,(v)=>{if(v!==null&&ST.holidayMode!==v){ST.holidayMode=v;render();}});
  fbListen(`kittenLogs/${todayISO}`,(kl)=>{if(!kl)return;Object.entries(kl).forEach(([kid,arr])=>{ST.kittenLogs[kid]=Array.isArray(arr)?arr:Object.values(arr)||[];});render();});
  fbListen(`damageLogs/${todayISO}`,(dl)=>{if(!dl)return;ST.damageLogs=Array.isArray(dl)?dl:Object.values(dl);render();});
}

function b64toFile(d,n){const a=d.split(","),m=a[0].match(/:(.*?);/)[1],s=atob(a[1]);let l=s.length;const u=new Uint8Array(l);while(l--){u[l]=s.charCodeAt(l);}return new File([u],n,{type:m});}
function bc(st){
  if(["ผ่าน","เข้างานแล้ว","อนุมัติ"].includes(st))return"background:#EAF3DE;color:#639922";
  if(["รอตรวจ","ส่งแล้ว","รออนุมัติ"].includes(st))return"background:#FAEEDA;color:#BA7517";
  if(["ตีกลับ","เลยเวลา","ลืมงาน","ไม่อนุมัติ"].includes(st))return"background:#FCEBEB;color:#A32D2D";
  if(st==="มาสาย")return"background:#FAECE7;color:#D85A30";
  if(st==="เลิกงานแล้ว")return"background:#E6F1FB;color:#185FA5";
  return"background:#F1EFE8;color:#888780";
}

          ${(f.photos||[]).length>0?`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:6px">${(f.photos||[]).map((p,i)=>`<div style="position:relative"><img src="${typeof p==="string"?p:p.preview}" style="width:100%;height:70px;object-fit:cover;border-radius:8px;display:block"/><button onclick="ST.kittenForm.photos.splice(${i},1);render()" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:9px;cursor:pointer">✕</button></div>`).join("")}</div>
          <button class="pb" onclick="document.getElementById('kFile').click()">+ เพิ่มรูป</button>`
          :`<button class="pb" onclick="document.getElementById('kFile').click()">📷 ถ่ายรูปก่อนบันทึก (บังคับ)</button>`}
        </div>
        ${allFilled
          ?`<button class="btn" style="background:#993556;color:#fff;margin-top:0" onclick="saveKitten('${k.id}')">✅ บันทึกรอบนี้</button>`
          :`<button class="btn" style="background:#E8E3DA;color:#888780;margin-top:0" onclick="tryKitten('${k.id}')">✅ บันทึกรอบนี้</button>`}
      </div>
    </div></div>`;
  }

  return hdr+notifPanel+content+modal+nav;
}

async function doCI(){

  const s=STAFF.find(x=>x.id===me.id);if(s){s.checkIn=t;s.status=st;}

  else{await fbSet(`tasks/${todayISO}/${id}`,{...patch,name:t?.name||id,assignee:t?.assignee||ST.loginUser.name,round:t?.round||"",category:t?.category||"daily"});await gasPost("submitTask",{date:todayISO,taskName:t?.name||id,assignee:t?.assignee||ST.loginUser.name,round:t?.round||"",category:t?.category||"daily",deadline:t?.deadline||"",submittedAt,status:"รอตรวจ",isLate:late,photoUrl,aiScore:ai?.score,aiStatus:ai?.status,note,iceChoice:extra.iceChoice||"",chickenWeight:extra.chickenWeight||"",chickenNote:extra.chickenNote||""});}

function exportCSV(){
  const allT=allTasks();
  const rows=[];
  const sep=()=>rows.push(["────────────────────────────────────────"]);
  const head=(...cols)=>rows.push(cols);
  const blank=()=>rows.push([]);

  // ══════════════════════════════════════
  // ส่วนที่ 1: หัวรายงาน
  // ══════════════════════════════════════
  rows.push([`รายงานประจำวัน Mori Cat Café — ${todayISO}`]);
  rows.push([`วัน${DOW_TH[todayDow]} | สร้างเมื่อ ${fmtTime(thaiNow())}`]);
  blank();

  // ══════════════════════════════════════
  // ส่วนที่ 2: สรุปค่าแรง + ค่าปรับ (เจ้าของดู)
  // ══════════════════════════════════════
  sep();
  rows.push(["💰 สรุปค่าแรงและค่าปรับประจำวัน"]);
  sep();
  head("ชื่อพนักงาน","ค่าแรงมาตรฐาน(฿)","เวลาเข้า","เวลาเลิก","สถานะ",
    "มาสาย?","ค่าปรับมาสาย(฿)","งานเลยเวลา(ชิ้น)","ค่าปรับงาน(฿)",
    "รวมค่าปรับ(฿)","ยอดสุทธิก่อนโบนัส(฿)","หมายเหตุ");

  STAFF.filter(s=>s.role==="staff").forEach(s=>{
    const u=USERS.find(x=>x.id===s.id),w=u?.wage||0;
    const isLate=s.status==="มาสาย";
    const lf=isLate?ST.settings.lateFine:0;
    const lateTasks=allT.filter(t=>t.assignee===s.name&&t.status==="ยังไม่ทำ"&&isTimePast(t.deadline));
    const tf=lateTasks.length*ST.settings.noTaskFine;
    const totalFine=lf+tf;
    const net=s.checkIn?Math.max(0,w-totalFine):0;
    rows.push([
      s.name, w,
      s.checkIn||"ไม่เข้างาน", s.checkOut||"ยังไม่เลิก",
      s.status,
      isLate?"ใช่":"ไม่","฿"+lf,
      lateTasks.length,"฿"+tf,
      "฿"+totalFine,"฿"+net,
      !s.checkIn?"ขาดงาน":isLate?"มาสายต้องแจ้ง owner":""
    ]);
  });
  blank();

  // รายละเอียดงานที่เลยเวลา (เพื่อประกอบการพิจารณาค่าปรับ)
  rows.push(["📋 งานเลยเวลาที่ใช้คำนวณค่าปรับ"]);
  head("พนักงาน","ชื่องาน","หมวด","กำหนดเวลา","สถานะ","ค่าปรับ/ชิ้น(฿)");
  let anyLate=false;
  STAFF.filter(s=>s.role==="staff").forEach(s=>{
    allT.filter(t=>t.assignee===s.name&&t.status==="ยังไม่ทำ"&&isTimePast(t.deadline)).forEach(t=>{
      rows.push([s.name,t.name,t.category||t.round,t.deadline||"","เลยเวลา","฿"+ST.settings.noTaskFine]);
      anyLate=true;
    });
  });
  if(!anyLate) rows.push(["✅ ไม่มีงานเลยเวลา"]);
  blank();

  // ══════════════════════════════════════
  // ส่วนที่ 3: สรุปการตัดสินใจค่าปรับของ Owner
  // (ดึงจาก notification log ที่บันทึกไว้)
  // ══════════════════════════════════════
  sep();
  rows.push(["⚖️ การตัดสินใจค่าปรับของเจ้าของ (วันนี้)"]);
  sep();
  head("พนักงาน","การตัดสินใจ","ค่าปรับจริงที่หัก(฿)","โบนัส/คอมมิสชั่น(฿)","ค่าแรงพิเศษ(฿)","ยอดสุทธิจริง(฿)","หมายเหตุ");
  // ดึงจาก notifs ที่มี 💰
  const fineNotifs=ST.notifs.filter(n=>n.msg&&n.msg.startsWith("💰"));
  if(fineNotifs.length>0){
    fineNotifs.forEach(n=>{
      // parse จาก message format: "💰 ชื่อ: หักค่าปรับ ฿X + โบนัส ฿Y | ยอดสุทธิ ฿Z"
      rows.push([n.msg.replace("💰 ",""), "ดูรายละเอียดในบันทึก","","","","",n.time]);
    });
  }else{
    rows.push(["ยังไม่มีการบันทึกค่าปรับวันนี้ — ใช้ยอดก่อนอนุโลมข้างต้นแทน"]);
  }
  blank();

  // ══════════════════════════════════════
  // ส่วนที่ 4: สรุปงานแต่ละหมวด
  // ══════════════════════════════════════
  const taskGroups=[
    ["🔄 รอบงาน","round",TASKS],
    ["📝 รายวัน","daily",DAILY_TASKS],
    ["☕ บาริสต้า","barista",BARISTA_TASKS],
    ["🎨 เพ้นท์","paint",[...PAINT_FREE_TASKS,...PAINT_ROUND_TASKS]],
    ["🚿 ห้องน้ำ","bathroom",BATHROOM_TASKS],
    ["🍳 ห้องครัว","kitchen",KITCHEN_TASKS],
    ["📅 รายสัปดาห์","weekly",WEEKLY_TODAY],
  ];

  taskGroups.forEach(([label,cat,tasks])=>{
    if(!tasks.length)return;
    const s=tStat(tasks);
    const pct=s.total?Math.round(s.done/s.total*100):0;
    sep();
    rows.push([label]);
    rows.push([
      `ผ่าน: ${s.done}`,`รอตรวจ: ${s.pending}`,
      `ยังไม่ทำ: ${s.todo}`,`เลยเวลา: ${s.late}`,
      `ตีกลับ: ${s.rej}`,`รวม: ${s.total}`,
      `คิดเป็น ${pct}%`,
      pct>=80?"✅ ดีมาก":pct>=60?"⚠️ พอใช้":"❌ ต้องปรับปรุง"
    ]);
    sep();

    // แยกเป็น 3 กลุ่มย่อย
    const done  =tasks.filter(t=>t.status==="ผ่าน");
    const pending=tasks.filter(t=>t.status==="รอตรวจ");
    const prob  =tasks.filter(t=>["ตีกลับ","ยังไม่ทำ"].includes(t.status)&&(t.status==="ตีกลับ"||isTimePast(t.deadline)));
    const normal=tasks.filter(t=>t.status==="ยังไม่ทำ"&&!isTimePast(t.deadline));

    if(done.length){
      rows.push(["✅ งานที่ผ่านแล้ว ("+done.length+" รายการ)"]);
      head("ชื่องาน","ผู้รับผิดชอบ","เวลาส่ง","จำนวนรูป");
      done.forEach(t=>{
        const pc=t.photoUrl?t.photoUrl.split(",").filter(Boolean).length:0;
        rows.push([t.name,t.assignee||"",t.submittedAt||"",pc+"รูป"]);
      });
      blank();
    }
    if(pending.length){
      rows.push(["⏳ งานรอตรวจ ("+pending.length+" รายการ)"]);
      head("ชื่องาน","ผู้รับผิดชอบ","เวลาส่ง","จำนวนรูป");
      pending.forEach(t=>{
        const pc=t.photoUrl?t.photoUrl.split(",").filter(Boolean).length:0;
        rows.push([t.name,t.assignee||"",t.submittedAt||"",pc+"รูป"]);
      });
      blank();
    }
    if(prob.length){
      rows.push(["❌ งานที่ต้องปรับปรุง / ตักเตือน ("+prob.length+" รายการ)"]);
      head("ชื่องาน","ผู้รับผิดชอบ","กำหนด","สถานะ","ข้อเสนอแนะ");
      prob.forEach(t=>{
        const eff=getEffStatus(t);
        const suggest=t.status==="ตีกลับ"?"ต้องส่งใหม่พร้อมรูปจากหน้างาน"
          :"งานเลยกำหนด ต้องตักเตือนพนักงาน";
        rows.push([t.name,t.assignee||"",t.deadline||"",eff,suggest]);
      });
      blank();
    }
    if(normal.length){
      rows.push(["⬜ งานที่ยังไม่ถึงเวลา/ยังทำได้ ("+normal.length+" รายการ)"]);
      head("ชื่องาน","ผู้รับผิดชอบ","กำหนด");
      normal.forEach(t=>{rows.push([t.name,t.assignee||"",t.deadline||""]);});
      blank();
    }
  });

  // ══════════════════════════════════════
  // ส่วนที่ 5: สรุปรายพนักงาน (ให้พนักงานเห็นภาพ)
  // ══════════════════════════════════════
  sep();
  rows.push(["👤 สรุปรายพนักงาน — เพื่อปรับปรุง"]);
  sep();
  STAFF.filter(s=>s.role==="staff").forEach(s=>{
    const myTasks=allT.filter(t=>t.assignee===s.name);
    const myDone=myTasks.filter(t=>t.status==="ผ่าน").length;
    const myPend=myTasks.filter(t=>t.status==="รอตรวจ").length;
    const myLate=myTasks.filter(t=>t.status==="ยังไม่ทำ"&&isTimePast(t.deadline));
    const myRej =myTasks.filter(t=>t.status==="ตีกลับ");
    const pct=myTasks.length?Math.round(myDone/myTasks.length*100):0;
    rows.push([`── ${s.name} ──`]);
    rows.push(["ผ่าน","รอตรวจ","เลยเวลา","ตีกลับ","รวม","% สำเร็จ","ประเมิน"]);
    rows.push([myDone,myPend,myLate.length,myRej.length,myTasks.length,pct+"%",
      pct>=90?"🌟 ยอดเยี่ยม":pct>=75?"✅ ดี":pct>=50?"⚠️ ปานกลาง":"❌ ต้องตักเตือน"]);
    if(myLate.length>0){
      rows.push(["  งานเลยเวลา:"]);
      myLate.forEach(t=>rows.push(["  •",t.name,t.deadline||"","ต้องแจ้งเหตุ"]));
    }
    if(myRej.length>0){
      rows.push(["  งานตีกลับ:"]);
      myRej.forEach(t=>rows.push(["  •",t.name,"","ต้องส่งใหม่"]));
    }
    blank();
  });

  // ══════════════════════════════════════
  // ส่วนที่ 6: ของเสียหายวันนี้
  // ══════════════════════════════════════
  if(ST.damageLogs.length>0){
    sep();
    rows.push(["🔴 รายงานของเสียหายวันนี้ ("+ST.damageLogs.length+" รายการ)"]);
    sep();
    head("เวลา","รายการ","เหตุผล","แจ้งโดย","จำนวนรูป","URL รูป");
    ST.damageLogs.forEach(l=>{
      rows.push([l.time,l.item,l.reason,l.reportedBy,(l.photos||[]).length,(l.photos||[]).join(" | ")]);
    });
    blank();
  }

  // ══════════════════════════════════════
  // ส่วนที่ 7: สุขภาพแมว
  // ══════════════════════════════════════
  const cs=catStat();
  sep();
  rows.push([`🐱 สุขภาพแมว — ตรวจแล้ว ${cs.checked}/${cs.total} ตัว | ผ่าน ${cs.passed} | รอตรวจ ${cs.pending} | ผิดปกติ ${cs.abnormal}`]);
  if(cs.abnormal>0){
    sep();
    rows.push(["⚠️ แมวที่พบความผิดปกติ"]);
    head("ชื่อแมว","สถานะ","รายละเอียด","ผู้บันทึก","เวลา");
    Object.entries(ST.catLogs).filter(([,l])=>l?.abnormal).forEach(([cat,l])=>{
      rows.push([cat,l.status||"",l.abnormalDetail||"",l.recordedBy||"",l.time||""]);
    });
    blank();
  }

  // ══════════════════════════════════════
  // ส่วนที่ 8: ข้อสรุปและคำแนะนำ (owner)
  // ══════════════════════════════════════
  sep();
  rows.push(["📌 สรุปภาพรวมและข้อเสนอแนะสำหรับเจ้าของ"]);
  sep();
  const totalAll=allT.length;
  const doneAll=allT.filter(t=>t.status==="ผ่าน").length;
  const lateAll=allT.filter(t=>t.status==="ยังไม่ทำ"&&isTimePast(t.deadline)).length;
  const rejAll=allT.filter(t=>t.status==="ตีกลับ").length;
  const pendAll=allT.filter(t=>t.status==="รอตรวจ").length;
  const pctAll=totalAll?Math.round(doneAll/totalAll*100):0;
  rows.push(["งานรวมทั้งหมด","ผ่านแล้ว","รอตรวจ","เลยเวลา","ตีกลับ","% สำเร็จ"]);
  rows.push([totalAll,doneAll,pendAll,lateAll,rejAll,pctAll+"%"]);
  blank();
  rows.push(["ข้อเสนอแนะ"]);
  if(lateAll>0) rows.push(["⚠️","มีงานเลยเวลา "+lateAll+" รายการ — ควรตักเตือนพนักงานและพิจารณาค่าปรับ"]);
  if(rejAll>0)  rows.push(["🔄","มีงานตีกลับ "+rejAll+" รายการ — ติดตามให้พนักงานส่งงานใหม่"]);
  if(cs.abnormal>0) rows.push(["🐱","พบแมวผิดปกติ "+cs.abnormal+" ตัว — ควรตรวจสอบและนัดสัตวแพทย์หากจำเป็น"]);
  if(ST.damageLogs.length>0) rows.push(["🔴","มีของเสียหาย "+ST.damageLogs.length+" รายการ — พิจารณาดำเนินการต่อ"]);
  if(lateAll===0&&rejAll===0&&cs.abnormal===0) rows.push(["✅","วันนี้ไม่มีปัญหาสำคัญ พนักงานทำงานได้ดีค่ะ 🐱"]);

  // ══════════════════════════════════════
  // Export
  // ══════════════════════════════════════
  const csv=rows.map(r=>r.map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));
  a.download=`Mori-รายงาน-${todayISO}.csv`;
  a.click();
}

// BOOT — ตรวจ reset ตั้งแต่ตอนโหลด
document.getElementById("app").innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh"><div style="font-size:40px">🐱</div><div style="font-size:13px;color:#5F5E5A;margin-top:8px">กำลังโหลด...</div></div>`;

// ✅ ตรวจตอนเปิดแอป: ถ้าเลยตี 3:30 แล้วยังไม่ได้ reset → reset ก่อน loadState
async function bootWithReset(){
  const now=thaiNow();
  const h=now.getHours(),m=now.getMinutes();
  const resetKey=`mori_reset_${todayISO}`;
  const pastResetTime=(h===3&&m>=30)||(h>3&&h<12); // ตี 3:30 ถึงเที่ยง = ช่วงวันใหม่
  if(pastResetTime && localStorage.getItem(resetKey)!=="done"){
    document.getElementById("app").innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh"><div style="font-size:40px">🔄</div><div style="font-size:13px;color:#993556;margin-top:8px;font-weight:500">กำลังเริ่มวันใหม่...</div><div style="font-size:11px;color:#888780;margin-top:4px">รีเซ็ตข้อมูลตี 3:30</div></div>`;
    await autoResetAtNight();
  }
  loadState();
}
bootWithReset();
</script>
